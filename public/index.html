<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>کشورگشایی</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&display=swap');

:root{
  --bg:#e7e2d6;
  --shadow-dark:#c3bcac;
  --shadow-light:#ffffff;
  --ink:#4a4335;
  --ink-soft:#8a8071;
  --accent:#b9834a;
  --accent-bg:#e3cfa2;
  --accent-shadow-d:#c2ab7c;
  --accent-shadow-l:#ffffff;
  --danger:#b5564a;
  --danger-bg:#e3b8ae;
  --danger-shadow-d:#c2938a;
  --ok:#5c8a5a;
  --radius:22px;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:'Vazirmatn',sans-serif;
  min-height:100vh;
}
h1,h2,h3,.display{font-family:'Vazirmatn',sans-serif; font-weight:800; letter-spacing:.2px;}
#app{max-width:1180px;margin:0 auto;padding:18px 14px 60px;}

.card{
  background:var(--bg);
  border-radius:var(--radius);
  box-shadow:9px 9px 18px var(--shadow-dark), -9px -9px 18px var(--shadow-light);
  border:none;
  padding:22px;
}
.title-row{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:6px;}
.crown{font-size:26px;}
h1.main-title{font-size:30px;color:var(--accent);text-align:center;margin:6px 0 2px;font-weight:900;}
.subtitle{text-align:center;color:var(--ink-soft);font-size:13px;margin-bottom:22px;}

label{display:block;font-size:13px;color:var(--ink-soft);margin:14px 0 8px;font-weight:600;}
input[type=text],select{
  width:100%;padding:12px 14px;border-radius:14px;border:none;
  background:var(--bg);color:var(--ink);font-family:inherit;font-size:14px;outline:none;
  box-shadow:inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
}
.btn{
  cursor:pointer;border:none;border-radius:14px;padding:11px 18px;
  background:var(--bg);color:var(--ink);font-family:inherit;
  font-size:14px;font-weight:700;transition:.12s;
  box-shadow:5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
}
.btn:hover:not(:disabled){box-shadow:3px 3px 7px var(--shadow-dark), -3px -3px 7px var(--shadow-light);}
.btn:active:not(:disabled){box-shadow:inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-gold{background:var(--accent-bg);color:#5c431c;box-shadow:5px 5px 10px var(--accent-shadow-d), -5px -5px 10px var(--accent-shadow-l);}
.btn-gold:active:not(:disabled){box-shadow:inset 4px 4px 8px var(--accent-shadow-d), inset -4px -4px 8px var(--accent-shadow-l);}
.btn-danger{background:var(--danger-bg);color:#6b241a;box-shadow:5px 5px 10px var(--danger-shadow-d), -5px -5px 10px #fff;}
.btn-danger:active:not(:disabled){box-shadow:inset 4px 4px 8px var(--danger-shadow-d), inset -4px -4px 8px #fff;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
.small{font-size:12px;color:var(--ink-soft);}
.hint{font-size:12px;color:var(--ink-soft);margin-top:8px;}

.tabs{display:flex;gap:6px;margin-bottom:10px;}
.tab{padding:7px 16px;border-radius:20px;cursor:pointer;font-size:13px;color:var(--ink-soft);
  box-shadow:3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);}
.tab.active{box-shadow:inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);color:var(--accent);font-weight:800;}

.color-swatches{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
.swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;
  box-shadow:4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);}
.swatch.selected{border-color:#fff;box-shadow:inset 3px 3px 6px rgba(0,0,0,.35);}
.swatch.taken{opacity:.25;cursor:not-allowed;}

.lobby-players{display:flex;flex-direction:column;gap:10px;margin:16px 0;}
.lobby-player{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:14px;
  box-shadow:inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);}
.dot{width:16px;height:16px;border-radius:50%;flex:none;box-shadow:1px 1px 2px rgba(0,0,0,.3);}
.code-display{
  text-align:center;font-size:34px;letter-spacing:6px;color:var(--accent);
  font-weight:900;margin:6px 0 2px;
}

.top-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.turn-banner{
  border-radius:18px;padding:10px 16px;display:flex;align-items:center;gap:14px;
  box-shadow:6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
}
.turn-banner .dot{width:14px;height:14px;}
.timer-badge{display:flex;align-items:center;gap:6px;border-radius:50px;padding:8px 16px;
  box-shadow:inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
  font-weight:800;color:var(--accent);white-space:nowrap;}
.timer-badge.warn{color:var(--danger);}
.players-strip{display:flex;gap:8px;flex-wrap:wrap;}
.player-chip{
  display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:20px;font-size:12px;
  box-shadow:3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
}
.player-chip.dead{opacity:.35;text-decoration:line-through;}
.player-chip.current{box-shadow:inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);color:var(--accent);font-weight:800;}

.layout{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;}
.map-wrap{flex:1;min-width:320px;}
.side-panel{width:300px;flex:none;display:flex;flex-direction:column;gap:12px;}

/* ===== MAP STYLES ===== */
.map-card{
  border-radius:28px;padding:14px;
  box-shadow:inset 8px 8px 16px var(--shadow-dark), inset -8px -8px 16px var(--shadow-light);
  overflow:hidden;
  position:relative;
}
.map-svg{width:100%;height:auto;display:block;}

/* سرزمین‌ها */
.territory-path{
  cursor:pointer;
  transition: filter 0.15s, opacity 0.15s;
  stroke:#2a2015;
  stroke-width:2.5;
  stroke-linejoin:round;
  paint-order: stroke fill;
}
.territory-path:hover{filter:brightness(1.18);}
.territory-path.selectable{
  stroke:#f5c842;
  stroke-width:4;
  filter:drop-shadow(0 0 8px rgba(245,200,66,.8));
  animation: pulse-select 1.1s infinite alternate;
}
.territory-path.selected{
  stroke:#ffffff;
  stroke-width:5;
  filter:drop-shadow(0 0 10px rgba(255,255,255,.7));
}
@keyframes pulse-select{
  from{filter:drop-shadow(0 0 6px rgba(245,200,66,.6));}
  to{filter:drop-shadow(0 0 14px rgba(245,200,66,1));}
}

/* برچسب‌های نقشه */
.territory-label{
  font-family:'Vazirmatn',sans-serif;
  font-size:11px;
  font-weight:800;
  fill:#fff;
  text-anchor:middle;
  dominant-baseline:central;
  paint-order:stroke fill;
  stroke:rgba(0,0,0,.55);
  stroke-width:3px;
  pointer-events:none;
}
.territory-label.capital-label{
  font-size:10px;
  fill:#ffe87a;
}
.territory-label.owner-label{
  font-size:9px;
  fill:rgba(255,255,255,.85);
  font-weight:600;
}
.territory-icon{
  font-size:14px;
  text-anchor:middle;
  dominant-baseline:central;
  pointer-events:none;
}

/* خطوط مرز دریا/زمینه */
.map-ocean{fill:#6a9ec4;opacity:0.35;}
.map-border-line{stroke:#c3b89a;stroke-width:1;stroke-dasharray:6,4;fill:none;opacity:0.5;}

/* legend */
.map-legend{
  display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;font-size:11px;color:var(--ink-soft);
}
.legend-item{display:flex;align-items:center;gap:5px;}
.legend-dot{width:12px;height:12px;border-radius:3px;border:1px solid rgba(0,0,0,.2);}

.action-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.action-btns .btn{width:100%;font-size:13px;padding:9px 6px;}
.log-box{
  border-radius:14px;padding:10px 12px;
  box-shadow:inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
  height:190px;overflow-y:auto;font-size:12.5px;display:flex;flex-direction:column;gap:6px;
}
.log-line{color:var(--ink-soft);padding-bottom:5px;border-bottom:1px dashed var(--shadow-dark);}
.log-line b{color:var(--ink);}
.chat-input-row{display:flex;gap:6px;margin-top:8px;}
.chat-input-row input{flex:1;}
.emoji-row{display:flex;gap:6px;margin-top:8px;}
.emoji-row button{background:var(--bg);border:none;border-radius:10px;font-size:16px;padding:5px 10px;cursor:pointer;
  box-shadow:3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);}

.modal-bg{position:fixed;inset:0;background:rgba(60,52,38,.42);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;}
.modal{background:var(--bg);border-radius:26px;padding:24px;max-width:420px;width:100%;text-align:center;
  box-shadow:12px 12px 24px var(--shadow-dark), -12px -12px 24px var(--shadow-light);}
.rps-row{display:flex;gap:14px;justify-content:center;margin-top:18px;}
.rps-btn{font-size:38px;background:var(--bg);border:none;border-radius:18px;width:76px;height:76px;cursor:pointer;
  box-shadow:6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);}
.rps-btn:active{box-shadow:inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);}
.banner-wait{border-radius:14px;padding:12px;font-size:13px;text-align:center;margin-bottom:10px;color:var(--accent);
  box-shadow:inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);}

.winner-screen{text-align:center;padding:50px 20px;}
.winner-screen .crown{font-size:70px;}

.footnote{font-size:11.5px;color:var(--ink-soft);margin-top:26px;line-height:2;padding-top:14px;
  border-top:1px dashed var(--shadow-dark);}
@media(max-width:760px){.side-panel{width:100%;}}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ===================== STORAGE HELPERS ===================== */
async function apiGet(key){
  try{
    const r = await fetch('/api/state/'+encodeURIComponent(key));
    if(!r.ok) return null;
    const d = await r.json();
    return d.value;
  }catch(e){ return null; }
}
async function apiSet(key,value){
  try{
    await fetch('/api/state/'+encodeURIComponent(key),{
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({value})
    });
  }catch(e){ console.error(e); }
}
async function loadRoom(code){
  const v = await apiGet('room-'+code);
  return v || null;
}
async function saveRoom(state){
  state.updatedAt = Date.now();
  await apiSet('room-'+state.code, state);
}
async function saveMyId(code,id){
  try{ localStorage.setItem('myid-'+code, id); }catch(e){}
}
async function loadMyId(code){
  try{ return localStorage.getItem('myid-'+code); }catch(e){ return null; }
}

/* ===================== CONSTANTS ===================== */
const COLORS = [
  {hex:'#b23a34',name:'قرمز'},
  {hex:'#2f5f8a',name:'آبی'},
  {hex:'#4c7a4a',name:'سبز'},
  {hex:'#6b4c8a',name:'بنفش'},
  {hex:'#c07a2e',name:'نارنجی'}
];
const RPS = [
  {k:'rock', icon:'🪨', label:'سنگ'},
  {k:'paper', icon:'📄', label:'کاغذ'},
  {k:'scissors', icon:'✂️', label:'قیچی'}
];
const TURN_SECONDS = 60;
function rpsWinner(a,b){
  if(a===b) return 'tie';
  if((a==='rock'&&b==='scissors')||(a==='scissors'&&b==='paper')||(a==='paper'&&b==='rock')) return 'a';
  return 'b';
}
function genCode(){ return String(Math.floor(100000+Math.random()*900000)); }
function uid(){ return Math.random().toString(36).slice(2,10); }

/* ===================== APP STATE ===================== */
let view = 'landing';
let code = null;
let myId = null;
let state = null;
let pollTimer = null;
let timeoutHandled = false;

let ui = {
  setupName:'', setupCapital:'', setupColor:null, joinCode:'', maxPlayers:3,
  actionMode:null,
  selectedCity:null,
  giftFromCity:null,
  activeTab:'log',
  chatText:''
};

function el(html){ const d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstElementChild; }
function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';
  let node;
  if(view==='landing') node = renderLanding();
  else if(view==='create') node = renderCreate();
  else if(view==='join') node = renderJoin();
  else if(view==='join-form') node = renderJoinForm();
  else if(view==='lobby') node = renderLobby();
  else if(view==='game') node = renderGame();
  app.appendChild(node);
}

/* ===================== LANDING ===================== */
function renderLanding(){
  const c = el(`<div class="card">
    <div class="title-row"><span class="crown">🏰</span></div>
    <h1 class="main-title">کِشورگُشایی</h1>
    <div class="subtitle">نبرد سرزمین‌ها با سنگ، کاغذ، قیچی — ۲ تا ۵ بازیکن، آنلاین</div>
    <div class="btn-row" style="justify-content:center">
      <button class="btn btn-gold" id="btnNew">ساخت بازی جدید</button>
      <button class="btn" id="btnJoin">پیوستن با کد اتاق</button>
    </div>
  </div>`);
  c.querySelector('#btnNew').onclick=()=>{view='create';render();};
  c.querySelector('#btnJoin').onclick=()=>{view='join';render();};
  return c;
}

/* ===================== CREATE ===================== */
function renderCreate(){
  const c = el(`<div class="card">
    <h2 class="display" style="text-align:center;color:var(--accent)">ساخت اتاق جدید</h2>
    <label>تعداد بازیکنان (۲ تا ۵)</label>
    <select id="maxP">
      <option value="2">۲ نفر</option>
      <option value="3" selected>۳ نفر (پیش‌فرض)</option>
      <option value="4">۴ نفر</option>
      <option value="5">۵ نفر</option>
    </select>
    <label>اسم کشور تو</label>
    <input type="text" id="cName" placeholder="مثلاً: پارسیا">
    <label>اسم پایتخت</label>
    <input type="text" id="cCap" placeholder="مثلاً: تخت‌جمشید">
    <label>رنگ کشور</label>
    <div class="color-swatches" id="swatches"></div>
    <div class="btn-row">
      <button class="btn btn-gold" id="go">ساخت اتاق</button>
      <button class="btn" id="back">بازگشت</button>
    </div>
  </div>`);
  const sw = c.querySelector('#swatches');
  COLORS.forEach(col=>{
    const s = el(`<div class="swatch ${ui.setupColor===col.hex?'selected':''}" style="background:${col.hex}" title="${col.name}"></div>`);
    s.onclick=()=>{ ui.setupColor=col.hex; render(); };
    sw.appendChild(s);
  });
  c.querySelector('#cName').value = ui.setupName;
  c.querySelector('#cCap').value = ui.setupCapital;
  c.querySelector('#cName').oninput = e=>ui.setupName=e.target.value;
  c.querySelector('#cCap').oninput = e=>ui.setupCapital=e.target.value;
  c.querySelector('#maxP').onchange = e=>ui.maxPlayers=parseInt(e.target.value);
  c.querySelector('#maxP').value = ui.maxPlayers;
  c.querySelector('#back').onclick=()=>{view='landing';render();};
  c.querySelector('#go').onclick= async ()=>{
    if(!ui.setupName.trim()||!ui.setupCapital.trim()||!ui.setupColor){ alert('لطفاً اسم کشور، پایتخت و رنگ را انتخاب کن'); return; }
    code = genCode();
    myId = uid();
    const newState = {
      code, phase:'lobby', maxPlayers: ui.maxPlayers, hostId: myId,
      players:[{id:myId, name:ui.setupName.trim(), capital:ui.setupCapital.trim(), color:ui.setupColor, alive:true, colonyOf:null, colonyTurnsLeft:0}],
      cities:[], currentPlayerIndex:0, turnCount:0,
      usedAttackThisTurn:false, usedBuildThisTurn:false,
      pendingBattle:null, pendingColonyChoice:null, log:[], chat:[], winnerId:null, version:0
    };
    state = newState;
    await saveMyId(code, myId);
    try{ localStorage.setItem('lastCode', code); }catch(e){}
    await saveRoom(state);
    view='lobby'; startPolling(); render();
  };
  return c;
}

/* ===================== JOIN ===================== */
function renderJoin(){
  const c = el(`<div class="card">
    <h2 class="display" style="text-align:center;color:var(--accent)">پیوستن به اتاق</h2>
    <label>کد اتاق (۶ رقمی)</label>
    <input type="text" id="jc" placeholder="مثلاً 482913" maxlength="6">
    <div class="btn-row">
      <button class="btn btn-gold" id="go">ادامه</button>
      <button class="btn" id="back">بازگشت</button>
    </div>
    <div class="hint" id="err" style="color:var(--danger);"></div>
  </div>`);
  c.querySelector('#jc').value = ui.joinCode;
  c.querySelector('#jc').oninput = e=>ui.joinCode=e.target.value.trim();
  c.querySelector('#back').onclick=()=>{view='landing';render();};
  c.querySelector('#go').onclick= async ()=>{
    const s = await loadRoom(ui.joinCode);
    if(!s){ c.querySelector('#err').textContent='اتاقی با این کد پیدا نشد.'; return; }
    const savedId = await loadMyId(ui.joinCode);
    if(s.phase!=='lobby'){
      if(savedId && s.players.some(p=>p.id===savedId)){
        code = ui.joinCode; myId = savedId; state = s;
        try{ localStorage.setItem('lastCode', code); }catch(e){}
        view='game'; startPolling(); render();
        return;
      }
      c.querySelector('#err').textContent='این بازی قبلاً شروع شده و نمی‌تونی به‌عنوان بازیکن جدید واردش بشی.';
      return;
    }
    if(s.players.length>=s.maxPlayers){ c.querySelector('#err').textContent='اتاق پر است.'; return; }
    code = ui.joinCode; state = s;
    view='join-form'; render();
  };
  return c;
}
function renderJoinForm(){
  const takenColors = state.players.map(p=>p.color);
  const c = el(`<div class="card">
    <h2 class="display" style="text-align:center;color:var(--accent)">پیوستن به اتاق ${code}</h2>
    <div class="small" style="text-align:center;margin-bottom:8px;">بازیکنان فعلی: ${state.players.map(p=>p.name).join('، ')||'—'}</div>
    <label>اسم کشور تو</label>
    <input type="text" id="cName" placeholder="مثلاً: پارسیا">
    <label>اسم پایتخت</label>
    <input type="text" id="cCap" placeholder="مثلاً: تخت‌جمشید">
    <label>رنگ کشور</label>
    <div class="color-swatches" id="swatches"></div>
    <div class="btn-row">
      <button class="btn btn-gold" id="go">پیوستن</button>
      <button class="btn" id="back">بازگشت</button>
    </div>
  </div>`);
  const sw = c.querySelector('#swatches');
  COLORS.forEach(col=>{
    const taken = takenColors.includes(col.hex);
    const s = el(`<div class="swatch ${taken?'taken':''} ${ui.setupColor===col.hex?'selected':''}" style="background:${col.hex}" title="${col.name}"></div>`);
    if(!taken) s.onclick=()=>{ ui.setupColor=col.hex; render(); };
    sw.appendChild(s);
  });
  c.querySelector('#cName').value = ui.setupName;
  c.querySelector('#cCap').value = ui.setupCapital;
  c.querySelector('#cName').oninput = e=>ui.setupName=e.target.value;
  c.querySelector('#cCap').oninput = e=>ui.setupCapital=e.target.value;
  c.querySelector('#back').onclick=()=>{view='landing';render();};
  c.querySelector('#go').onclick= async ()=>{
    if(!ui.setupName.trim()||!ui.setupCapital.trim()||!ui.setupColor){ alert('لطفاً همه فیلدها را پر کن'); return; }
    const fresh = await loadRoom(code);
    if(!fresh || fresh.phase!=='lobby' || fresh.players.length>=fresh.maxPlayers){ alert('اتاق دیگر در دسترس نیست.'); view='landing'; render(); return; }
    myId = uid();
    fresh.players.push({id:myId,name:ui.setupName.trim(),capital:ui.setupCapital.trim(),color:ui.setupColor,alive:true,colonyOf:null,colonyTurnsLeft:0});
    fresh.version=(fresh.version||0)+1;
    state = fresh;
    await saveMyId(code, myId);
    try{ localStorage.setItem('lastCode', code); }catch(e){}
    await saveRoom(state);
    view='lobby'; startPolling(); render();
  };
  return c;
}

/* ===================== LOBBY ===================== */
function renderLobby(){
  const isHost = myId===state.hostId;
  const c = el(`<div class="card">
    <h2 class="display" style="text-align:center;color:var(--accent)">در انتظار بازیکنان...</h2>
    <div class="code-display">${code}</div>
    <div class="small" style="text-align:center;">این کد را با دوستانت به اشتراک بگذار</div>
    <div class="btn-row" style="justify-content:center">
      <button class="btn" id="copyLink">📋 کپی لینک دعوت</button>
    </div>
    <div class="lobby-players" id="plist"></div>
    <div class="small" style="text-align:center;">${state.players.length} از ${state.maxPlayers} بازیکن</div>
    ${isHost && state.players.length<state.maxPlayers ? `
    <div class="btn-row" style="justify-content:center">
      <select id="botLevel">
        <option value="easy">ربات آسان</option>
        <option value="medium">ربات متوسط</option>
        <option value="hard">ربات سخت</option>
      </select>
      <button class="btn" id="addBotBtn">➕ افزودن ربات</button>
    </div>` : ''}
    <div class="btn-row" style="justify-content:center">
      <button class="btn btn-gold" id="startBtn" ${(!isHost || state.players.length<2)?'disabled':''}>شروع بازی</button>
    </div>
    ${!isHost?'<div class="hint" style="text-align:center">فقط سازنده اتاق می‌تواند بازی را شروع کند.</div>':''}
  </div>`);
  c.querySelector('#copyLink').onclick = ()=>{
    const link = window.location.origin + window.location.pathname + '?code='+code;
    navigator.clipboard?.writeText(link).then(()=>alert('لینک دعوت کپی شد:\n'+link)).catch(()=>alert(link));
  };
  const pl = c.querySelector('#plist');
  state.players.forEach(p=>{
    pl.appendChild(el(`<div class="lobby-player"><div class="dot" style="background:${p.color}"></div><div><b>${p.name}</b>${p.isBot?' 🤖':''} — پایتخت: ${p.capital} ${p.id===state.hostId?'👑':''} ${p.id===myId?'(تو)':''}</div></div>`));
  });
  const addBotBtn = c.querySelector('#addBotBtn');
  if(addBotBtn){
    addBotBtn.onclick = async ()=>{
      const level = c.querySelector('#botLevel').value;
      const usedColors = state.players.map(p=>p.color);
      const colorObj = COLORS.find(cc=>!usedColors.includes(cc.hex));
      if(!colorObj){ alert('رنگ آزادی برای ربات نمانده.'); return; }
      const levelLabel = level==='easy'?'آسان':level==='medium'?'متوسط':'سخت';
      const bot = { id:'bot-'+uid(), name:'ربات '+levelLabel, capital:'دژ خودکار '+levelLabel, color:colorObj.hex,
        alive:true, colonyOf:null, colonyTurnsLeft:0, isBot:true, botLevel:level };
      state.players.push(bot);
      state.version=(state.version||0)+1;
      await saveRoom(state);
      render();
    };
  }
  if(isHost){
    c.querySelector('#startBtn').onclick = async ()=>{
      startGame();
      await saveRoom(state);
      view='game'; render();
    };
  }
  return c;
}

// ترتیب نمایش سرزمین‌ها برای هر تعداد بازیکن
// slot های فعال بر اساس تعداد بازیکن
const SLOT_ACTIVE = {
  2: [0, 4],           // شمال‌غربی و جنوب‌شرقی (روبروی هم)
  3: [0, 1, 2],        // سه گوش
  4: [0, 1, 3, 4],     // چهار گوشه
  5: [0, 1, 2, 3, 4]  // همه
};

function buildMap(players) {
  const n = players.length;
  const activeSlots = SLOT_ACTIVE[n] || SLOT_ACTIVE[5];
  const cities = [];

  players.forEach((pl, idx) => {
    const slot = activeSlots[idx];
    const slotPrefix = 's' + (slot + 1) + '_';

    Object.entries(MAP_TERRITORIES).forEach(([tid, tdata]) => {
      if (tdata.playerSlot !== slot) return;

      // محاسبه همسایه‌ها — فقط ناحیه‌هایی که در بازی فعال هستند
      const activeIds = Object.entries(MAP_TERRITORIES)
        .filter(([, td]) => activeSlots.includes(td.playerSlot))
        .map(([id]) => id);

      const validNeighbors = tdata.neighbors.filter(nid => activeIds.includes(nid));

      cities.push({
        id: tid,
        ownerId: pl.id,
        isCapital: tdata.isCapital,
        hasCastle: false,
        construction: null,
        // داده‌های نقشه
        mapPath: tdata.path,
        mapCx: tdata.cx,
        mapCy: tdata.cy,
        mapName: tdata.name,
        neighborIds: validNeighbors,
        // برای سازگاری با سیستم قدیمی (row/col برای نام‌گذاری)
        row: slot,
        col: tdata.isCapital ? 0 : 1
      });
    });
  });

  return { cities, mapWidth: 640, mapHeight: 450 };
}

function startGame() {
  const { cities, mapWidth, mapHeight } = buildMap(state.players);
  state.cities = cities;
  state.mapWidth = mapWidth;
  state.mapHeight = mapHeight;
  state.phase = 'playing';
  state.currentPlayerIndex = 0;
  state.turnCount = 1;
  state.roundNumber = 1;
  state.roundAnchorId = state.players[0].id;
  state.usedAttackThisTurn = false;
  state.usedBuildThisTurn = false;
  state.pendingBattle = null;
  state.pendingColonyChoice = null;
  state.turnStartedAt = Date.now();
  state.log = [{ turn: 0, text: '🏳️ بازی «کِشورگُشایی» آغاز شد. نوبت اول با ' + state.players[0].name + ' است.' }];
  state.chat = [];
  state.winnerId = null;
  state.players.forEach(p => { p.colonyOf = null; p.colonyTurnsLeft = 0; });
  state.version = (state.version || 0) + 1;
}

/* ===================== GAME HELPERS ===================== */
function cityById(id) { return state.cities.find(c => c.id === id); }
function playerById(id) { return state.players.find(p => p.id === id); }
function currentPlayer() { return state.players[state.currentPlayerIndex]; }
function isMyTurn() { return currentPlayer() && currentPlayer().id === myId; }

function landNeighbors(city) {
  if (city.neighborIds) {
    return city.neighborIds
      .map(nid => cityById(nid))
      .filter(Boolean);
  }
  // fallback
  const res = [];
  const dirs = [[0, 1], [0, -1], [1, 0], [-1, 0]];
  dirs.forEach(([dr, dc]) => {
    const n = state.cities.find(c => c.row === city.row + dr && c.col === city.col + dc);
    if (n) res.push(n);
  });
  return res;
}

function attackTargets(city) {
  const owner = playerById(city.ownerId);
  const targets = new Map();
  landNeighbors(city).forEach(n => {
    if (n.ownerId === city.ownerId) return;
    if (owner && owner.colonyOf && n.ownerId === owner.colonyOf) return;
    targets.set(n.id, n);
  });
  return [...targets.values()];
}
function cityCount(pid) { return state.cities.filter(c => c.ownerId === pid).length; }

function checkElimination() {
  state.players.forEach(p => {
    if (p.alive && cityCount(p.id) === 0) {
      p.alive = false;
      state.log.push({ turn: state.turnCount, text: '💀 ' + p.name + ' تمام سرزمین‌های خود را از دست داد و منحل شد.' });
    }
  });
  const aliveP = state.players.filter(p => p.alive);
  if (aliveP.length <= 1 && state.phase === 'playing') {
    state.phase = 'ended';
    state.winnerId = aliveP.length === 1 ? aliveP[0].id : null;
    state.log.push({ turn: state.turnCount, text: aliveP.length === 1 ? '👑 ' + aliveP[0].name + ' برنده نهایی بازی شد!' : '🏳️ بازی بدون برنده به پایان رسید.' });
  }
}

function advanceConstructions() {
  state.cities.forEach(c => {
    if (c.construction) {
      const roundsElapsed = (state.roundNumber || 1) - c.construction.startRound;
      if (roundsElapsed >= 2) {
        c.hasCastle = true;
        state.log.push({ turn: state.turnCount, text: '🏰 ساخت قلعه در ' + cityDisplayName(c) + ' به پایان رسید.' });
        c.construction = null;
      }
    }
  });
}
function cityDisplayName(c) {
  const own = playerById(c.ownerId);
  const tname = c.mapName || c.id;
  return (c.isCapital ? '★ ' : '') + tname + ' (' + (own ? own.name : 'بی‌صاحب') + ')';
}

async function pushState() {
  state.version = (state.version || 0) + 1;
  await saveRoom(state);
  render();
}

function nextTurn() {
  checkElimination();
  if (state.phase !== 'playing') return;
  let idx = state.currentPlayerIndex;
  for (let i = 0; i < state.players.length; i++) {
    idx = (idx + 1) % state.players.length;
    if (state.players[idx].alive) break;
  }
  state.currentPlayerIndex = idx;
  state.turnCount++;
  state.usedAttackThisTurn = false;
  state.usedBuildThisTurn = false;
  state.turnStartedAt = Date.now();
  const cp = currentPlayer();
  if (!state.roundAnchorId || !playerById(state.roundAnchorId) || !playerById(state.roundAnchorId).alive) {
    state.roundAnchorId = cp.id;
  }
  if (cp.id === state.roundAnchorId) {
    state.roundNumber = (state.roundNumber || 1) + 1;
  }
  advanceConstructions();
  if (cp.colonyOf) {
    cp.colonyTurnsLeft = (cp.colonyTurnsLeft || 0) - 1;
    if (cp.colonyTurnsLeft <= 0) {
      const master = playerById(cp.colonyOf);
      state.log.push({ turn: state.turnCount, text: '🔓 ' + cp.name + ' از مستعمرگی آزاد شد.' });
      cp.colonyOf = null; cp.colonyTurnsLeft = 0;
    }
  }
  state.log.push({ turn: state.turnCount, text: '▶️ نوبت ' + cp.name + ' رسید.' });
}

/* ===================== ACTIONS ===================== */
async function declareAttack(srcId, tgtId) {
  const tgt = cityById(tgtId);
  state.pendingBattle = {
    attackerCity: srcId, defenderCity: tgtId, attackerId: myId, defenderId: tgt.ownerId,
    stage: 1, attackerChoice: null, defenderChoice: null
  };
  state.usedAttackThisTurn = true;
  state.log.push({ turn: state.turnCount, text: '⚔️ ' + currentPlayer().name + ' به ' + cityDisplayName(tgt) + ' حمله کرد.' });
  ui.actionMode = null; ui.selectedCity = null;
  await pushState();
}
async function doNeutralAttack(srcId, tgtId) {
  const tgt = cityById(tgtId);
  tgt.ownerId = myId;
  tgt.hasCastle = false;
  state.usedAttackThisTurn = true;
  state.log.push({ turn: state.turnCount, text: '🏳️ ' + currentPlayer().name + ' سرزمین بی‌صاحب ' + cityDisplayName(tgt) + ' را تصرف کرد.' });
  ui.actionMode = null; ui.selectedCity = null;
  checkElimination();
  await pushState();
}
async function submitBattleChoice(role, choice) {
  const fresh = await loadRoom(code);
  if (fresh) state = fresh;
  const pb = state.pendingBattle;
  if (!pb) return;
  if (role === 'attacker') {
    if (pb.attackerChoice) return;
    pb.attackerChoice = choice;
  } else {
    if (pb.defenderChoice) return;
    pb.defenderChoice = choice;
  }
  if (pb.attackerChoice && pb.defenderChoice) {
    resolveBattleStage();
  }
  await pushState();
}
function recordRpsChoice(pid, choice) {
  if (!state.rpsHistory) state.rpsHistory = {};
  if (!state.rpsHistory[pid]) state.rpsHistory[pid] = { rock: 0, paper: 0, scissors: 0 };
  state.rpsHistory[pid][choice]++;
}
function resolveBattleStage() {
  const pb = state.pendingBattle;
  const tgt = cityById(pb.defenderCity);
  const w = rpsWinner(pb.attackerChoice, pb.defenderChoice);
  const atkP = playerById(pb.attackerId), defP = playerById(pb.defenderId);
  recordRpsChoice(pb.attackerId, pb.attackerChoice);
  recordRpsChoice(pb.defenderId, pb.defenderChoice);
  if (w === 'tie') {
    state.log.push({ turn: state.turnCount, text: '🤝 نبرد مساوی شد! دوباره سنگ‌کاغذقیچی...' });
    pb.attackerChoice = null; pb.defenderChoice = null;
    return;
  }
  const attackerWon = w === 'a';
  if (tgt.hasCastle && pb.stage === 1) {
    if (attackerWon) {
      tgt.hasCastle = false;
      state.log.push({ turn: state.turnCount, text: '🏰💥 قلعه ' + cityDisplayName(tgt) + ' تخریب شد! نبرد ادامه دارد...' });
      pb.stage = 2; pb.attackerChoice = null; pb.defenderChoice = null;
      return;
    } else {
      state.log.push({ turn: state.turnCount, text: '🛡️ حمله توسط قلعه دفع شد!' });
      state.pendingBattle = null;
      return;
    }
  }
  if (attackerWon) {
    tgt.ownerId = pb.attackerId;
    state.log.push({ turn: state.turnCount, text: '🚩 ' + atkP.name + ' سرزمین ' + cityDisplayName(tgt) + ' را تصرف کرد!' });
    if (tgt.isCapital && defP) {
      state.pendingColonyChoice = { defenderId: defP.id, attackerId: atkP.id, cityId: tgt.id, defenderDecision: null };
      state.log.push({ turn: state.turnCount, text: '👑💔 پایتخت ' + defP.name + ' سقوط کرد!' });
    }
  } else {
    state.log.push({ turn: state.turnCount, text: '🛡️ ' + defP.name + ' با موفقیت دفاع کرد.' });
  }
  state.pendingBattle = null;
  checkElimination();
}
async function submitColonyChoice(choice) {
  const fresh = await loadRoom(code);
  if (fresh) state = fresh;
  const pc = state.pendingColonyChoice;
  if (!pc) return;
  const defP = playerById(pc.defenderId), atkP = playerById(pc.attackerId);
  if (choice === 'dissolve') {
    defP.alive = false;
    state.log.push({ turn: state.turnCount, text: '💀 ' + defP.name + ' منحل‌شدن را انتخاب کرد.' });
    state.pendingColonyChoice = null;
    checkElimination();
  } else {
    pc.defenderDecision = 'colony';
    state.log.push({ turn: state.turnCount, text: '📨 ' + defP.name + ' درخواست مستعمره‌شدن داد...' });
  }
  await pushState();
}
async function submitOverlordDecision(accept) {
  const fresh = await loadRoom(code);
  if (fresh) state = fresh;
  const pc = state.pendingColonyChoice;
  if (!pc) return;
  const defP = playerById(pc.defenderId), atkP = playerById(pc.attackerId);
  if (accept) {
    defP.colonyOf = atkP.id;
    defP.colonyTurnsLeft = 5;
    state.log.push({ turn: state.turnCount, text: '🤝 ' + atkP.name + ' پذیرفت؛ ' + defP.name + ' مستعمره شد.' });
  } else {
    defP.alive = false;
    state.log.push({ turn: state.turnCount, text: '❌ درخواست رد شد؛ ' + defP.name + ' منحل شد.' });
    checkElimination();
  }
  state.pendingColonyChoice = null;
  await pushState();
}
async function startBuild(cityId) {
  const c = cityById(cityId);
  c.construction = { startRound: state.roundNumber || 1 };
  state.usedBuildThisTurn = true;
  state.log.push({ turn: state.turnCount, text: '🏗️ ' + currentPlayer().name + ' ساخت قلعه در ' + cityDisplayName(c) + ' را آغاز کرد.' });
  ui.actionMode = null; ui.selectedCity = null;
  await pushState();
}
async function doGift(cityId, targetPlayerId) {
  const c = cityById(cityId);
  const from = playerById(c.ownerId), to = playerById(targetPlayerId);
  c.ownerId = targetPlayerId;
  if (!to.alive) {
    to.alive = true;
    to.colonyOf = null; to.colonyTurnsLeft = 0;
    state.log.push({ turn: state.turnCount, text: '🕊️ ' + from.name + ' با هدیه ' + cityDisplayName(c) + ' به ' + to.name + '، او را بازگرداند!' });
  } else {
    state.log.push({ turn: state.turnCount, text: '🎁 ' + from.name + ' سرزمین ' + cityDisplayName(c) + ' را به ' + to.name + ' هدیه داد.' });
  }
  ui.actionMode = null; ui.selectedCity = null; ui.giftFromCity = null;
  checkElimination();
  await pushState();
}
async function doSurrender() {
  if (!confirm('آیا مطمئنی می‌خواهی تسلیم شوی؟')) return;
  const me = playerById(myId);
  me.alive = false;
  state.cities.forEach(c => { if (c.ownerId === myId) { c.ownerId = null; c.hasCastle = false; c.construction = null; } });
  state.log.push({ turn: state.turnCount, text: '🏳️ ' + me.name + ' تسلیم شد.' });
  if (isMyTurn()) nextTurn(); else checkElimination();
  await pushState();
}
async function endTurn() {
  nextTurn();
  await pushState();
}
async function sendChat() {
  if (!ui.chatText.trim()) return;
  const me = playerById(myId);
  state.chat.push({ playerId: myId, name: me.name, color: me.color, text: ui.chatText.trim(), time: Date.now() });

/* ===================== TURN TIMER ===================== */
function tickTimer() {
  if (view !== 'game' || !state || state.phase !== 'playing' || !state.turnStartedAt) return;
  const remaining = Math.max(0, TURN_SECONDS - Math.floor((Date.now() - state.turnStartedAt) / 1000));
  const numEl = document.getElementById('turnTimerNum');
  const badgeEl = document.getElementById('timerBadge');
  if (numEl) { numEl.textContent = remaining; if (badgeEl) badgeEl.classList.toggle('warn', remaining <= 10); }
  if (remaining <= 0) { handleTurnTimeout(); }
}
async function handleTurnTimeout() {
  if (timeoutHandled) return;
  timeoutHandled = true;
  try {
    const fresh = await loadRoom(code);
    if (fresh && fresh.phase === 'playing' && fresh.turnStartedAt === state.turnStartedAt) {
      state = fresh;
      const cp = currentPlayer();
      state.log.push({ turn: state.turnCount, text: '⏰ زمان ' + cp.name + ' تمام شد؛ نوبت رد شد.' });
      nextTurn();
      await pushState();
    } else if (fresh) {
      state = fresh; render();
    }
  } finally { timeoutHandled = false; }
}
setInterval(tickTimer, 1000);

/* ===================== BOT AI ===================== */
let botActing = false;
function botDelay() { return new Promise(r => setTimeout(r, 900 + Math.random() * 900)); }
function counterOf(choice) { return choice === 'rock' ? 'paper' : choice === 'paper' ? 'scissors' : 'rock'; }
function botChoiceRPS(bot, opponentId) {
  const opts = ['rock', 'paper', 'scissors'];
  const rnd = () => opts[Math.floor(Math.random() * 3)];
  if (bot.botLevel === 'easy') return rnd();
  const hist = state.rpsHistory && state.rpsHistory[opponentId];
  const total = hist ? hist.rock + hist.paper + hist.scissors : 0;
  if (bot.botLevel === 'medium') {
    if (total >= 2 && Math.random() < 0.5) {
      const top = Object.entries(hist).sort((a, b) => b[1] - a[1])[0];
      return counterOf(top[0]);
    }
    return rnd();
  }
  if (total > 0) {
    const top = Object.entries(hist).sort((a, b) => b[1] - a[1])[0];
    return counterOf(top[0]);
  }
  return rnd();
}
async function runBotTurn(bot) {
  const myCities = state.cities.filter(c => c.ownerId === bot.id);
  const attackProb = bot.botLevel === 'easy' ? 0.4 : bot.botLevel === 'medium' ? 0.65 : 0.9;
  if (!state.usedAttackThisTurn && Math.random() < attackProb) {
    let pairs = [];
    myCities.forEach(src => { attackTargets(src).forEach(tgt => pairs.push([src, tgt])); });
    if (pairs.length > 0) {
      let chosen;
      if (bot.botLevel === 'easy') {
        chosen = pairs[Math.floor(Math.random() * pairs.length)];
      } else {
        pairs.sort((a, b) => {
          const score = (t) => (t.isCapital ? -100 : 0) + (t.hasCastle ? 5 : 0) + cityCount(t.ownerId);
          return score(a[1]) - score(b[1]);
        });
        chosen = pairs[0];
      }
      await declareAttack(chosen[0].id, chosen[1].id);
      if (state.pendingBattle && state.pendingBattle.attackerId === bot.id && !state.pendingBattle.attackerChoice) {
        await submitBattleChoice('attacker', botChoiceRPS(bot, state.pendingBattle.defenderId));
      }
    }
  }
  if (state.phase === 'playing' && !state.pendingBattle && !state.pendingColonyChoice) {
    const buildProb = bot.botLevel === 'easy' ? 0.2 : bot.botLevel === 'medium' ? 0.5 : 0.8;
    if (!state.usedBuildThisTurn && Math.random() < buildProb) {
      const buildable = state.cities.filter(c => c.ownerId === bot.id && !c.hasCastle && !c.construction);
      if (buildable.length > 0) {
        const target = buildable[Math.floor(Math.random() * buildable.length)];
        await startBuild(target.id);
      }
    }
  }
  if (state.phase === 'playing' && !state.pendingBattle && !state.pendingColonyChoice) {
    await endTurn();
  }
}
async function maybeRunBot() {
  if (botActing) return;
  if (view !== 'game' || !state || state.phase !== 'playing') return;
  if (state.pendingColonyChoice) {
    const pc = state.pendingColonyChoice;
    const defP = playerById(pc.defenderId), atkP = playerById(pc.attackerId);
    if (defP && defP.isBot && !pc.defenderDecision) {
      botActing = true;
      await botDelay();
      const fresh = await loadRoom(code); if (fresh) state = fresh;
      if (state.pendingColonyChoice && !state.pendingColonyChoice.defenderDecision) { await submitColonyChoice('colony'); }
      botActing = false; return;
    }
    if (pc.defenderDecision === 'colony' && atkP && atkP.isBot) {
      botActing = true;
      await botDelay();
      const fresh = await loadRoom(code); if (fresh) state = fresh;
      if (state.pendingColonyChoice && state.pendingColonyChoice.defenderDecision === 'colony') {
        await submitOverlordDecision(atkP.botLevel !== 'hard');
      }
      botActing = false; return;
    }
    return;
  }
  if (state.pendingBattle) {
    const pb = state.pendingBattle;
    const atkP = playerById(pb.attackerId), defP = playerById(pb.defenderId);
    if (atkP && atkP.isBot && !pb.attackerChoice) {
      botActing = true; await botDelay();
      const fresh = await loadRoom(code); if (fresh) state = fresh;
      if (state.pendingBattle && !state.pendingBattle.attackerChoice) { await submitBattleChoice('attacker', botChoiceRPS(atkP, pb.defenderId)); }
      botActing = false; return;
    }
    if (defP && defP.isBot && !pb.defenderChoice) {
      botActing = true; await botDelay();
      const fresh = await loadRoom(code); if (fresh) state = fresh;
      if (state.pendingBattle && !state.pendingBattle.defenderChoice) { await submitBattleChoice('defender', botChoiceRPS(defP, pb.attackerId)); }
      botActing = false; return;
    }
    return;
  }
  const cp = currentPlayer();
  if (cp && cp.isBot) {
    botActing = true;
    await botDelay();
    const fresh = await loadRoom(code); if (fresh) state = fresh;
    const cp2 = currentPlayer();
    if (cp2 && cp2.isBot && cp2.id === cp.id && state.phase === 'playing' && !state.pendingBattle && !state.pendingColonyChoice) {
      await runBotTurn(cp2);
    }
    botActing = false;
  }
}
setInterval(maybeRunBot, 1500);

  const wrap = document.createElement('div');

  renderModals(wrap);

// ابزارهای رنگی
function lightenColor(hex, amount) {
  const num = parseInt(hex.slice(1), 16);
  const r = Math.min(255, (num >> 16) + amount);
  const g = Math.min(255, ((num >> 8) & 0xff) + amount);
  const b = Math.min(255, (num & 0xff) + amount);
  return '#' + ((1 << 24) | (r << 16) | (g << 8) | b).toString(16).slice(1);
}
function darkenColor(hex, amount) {
  const num = parseInt(hex.slice(1), 16);
  const r = Math.max(0, (num >> 16) - amount);
  const g = Math.max(0, ((num >> 8) & 0xff) - amount);
  const b = Math.max(0, (num & 0xff) - amount);
  return '#' + ((1 << 24) | (r << 16) | (g << 8) | b).toString(16).slice(1);
}

function isSelectableCity(c) {
  if (!isMyTurn() || state.pendingBattle) return false;
  if (ui.actionMode === 'attack-src') return c.ownerId === myId && attackTargets(c).length > 0 && !state.usedAttackThisTurn;
  if (ui.actionMode === 'attack-tgt') return attackTargets(cityById(ui.selectedCity)).some(t => t.id === c.id);
  if (ui.actionMode === 'build-src') return c.ownerId === myId && !c.construction && !c.hasCastle && !state.usedBuildThisTurn;
  if (ui.actionMode === 'gift-src') return c.ownerId === myId;
  return false;
}

function handleCityClick(cid) {
  const c = cityById(cid);
  if (!c) return;
  if (ui.actionMode === 'attack-src' && c.ownerId === myId) { ui.selectedCity = cid; ui.actionMode = 'attack-tgt'; render(); return; }
  if (ui.actionMode === 'attack-tgt') {
    const src = cityById(ui.selectedCity);
    if (!attackTargets(src).some(t => t.id === cid)) return;
    if (c.ownerId === null) { doNeutralAttack(ui.selectedCity, cid); return; }
    declareAttack(ui.selectedCity, cid);
    return;
  }
  if (ui.actionMode === 'build-src' && c.ownerId === myId) { startBuild(cid); return; }
  if (ui.actionMode === 'gift-src' && c.ownerId === myId) { ui.giftFromCity = cid; ui.actionMode = 'gift-choose'; render(); return; }
}

  if (ui.activeTab === 'log') {
    const box = el(`<div class="log-box"></div>`);
    [...state.log].slice(-60).reverse().forEach(l => {
      box.appendChild(el(`<div class="log-line">${l.text}</div>`));
    });
    logCard.appendChild(box);
  } else {
    const box = el(`<div class="log-box"></div>`);
    [...state.chat].slice(-60).reverse().forEach(m => {
      box.appendChild(el(`<div class="log-line"><b style="color:${m.color}">${m.name}:</b> ${escapeHtml(m.text)}</div>`));
    });
    logCard.appendChild(box);
    const row = el(`<div class="chat-input-row"><input type="text" id="chatIn" placeholder="پیام..."><button class="btn">ارسال</button></div>`);
    row.querySelector('#chatIn').value = ui.chatText;
    row.querySelector('#chatIn').oninput = e => ui.chatText = e.target.value;
    row.querySelector('#chatIn').addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });
    row.querySelector('button').onclick = sendChat;
    logCard.appendChild(row);
    const emoji = el(`<div class="emoji-row"></div>`);
    ['😂', '😡', '🔥', 'GG'].forEach(t => {
      const b = document.createElement('button'); b.textContent = t;
      b.onclick = () => { ui.chatText = t; sendChat(); };
      emoji.appendChild(b);
    });
    logCard.appendChild(emoji);
  }
  panel.appendChild(logCard);
  return panel;
}
function escapeHtml(s) { return s.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m])); }

function modeHint() {
  if (ui.actionMode === 'attack-src') return 'روی یکی از سرزمین‌های خودت (هایلایت طلایی) کلیک کن.';
  if (ui.actionMode === 'attack-tgt') return 'حالا روی سرزمین دشمن مجاور (هایلایت شده) کلیک کن.';
  if (ui.actionMode === 'build-src') return 'سرزمینی که می‌خواهی قلعه بسازی را انتخاب کن.';
  if (ui.actionMode === 'gift-src') return 'سرزمینی که می‌خواهی هدیه دهی را انتخاب کن.';
  if (ui.actionMode === 'gift-choose') return 'گیرنده هدیه را از پنجره انتخاب کن.';
  return '';
}

function renderModals(wrap) {
  if (state.pendingBattle) {
    const pb = state.pendingBattle;
    if (pb.attackerId === myId && !pb.attackerChoice) {
      const tgt = cityById(pb.defenderCity);
      const m = el(`<div class="modal-bg"><div class="modal">
        <h3 class="display" style="color:var(--accent)">حمله به ${cityDisplayName(tgt)}</h3>
        <div class="small">${pb.stage === 2 ? 'قلعه تخریب شد — نبرد ادامه دارد. ' : ''}انتخاب تو:</div>
        <div class="rps-row" id="rpsRow"></div>
      </div></div>`);
      const row = m.querySelector('#rpsRow');
      RPS.forEach(o => {
        const b = el(`<button class="rps-btn" title="${o.label}">${o.icon}</button>`);
        b.onclick = () => submitBattleChoice('attacker', o.k);
        row.appendChild(b);
      });
      wrap.appendChild(m);
    } else if (pb.defenderId === myId && !pb.defenderChoice) {
      const tgt = cityById(pb.defenderCity);
      const atkP = playerById(pb.attackerId);
      const m = el(`<div class="modal-bg"><div class="modal">
        <h3 class="display" style="color:var(--accent)">${atkP.name} به ${cityDisplayName(tgt)} حمله کرد!</h3>
        <div class="small">${pb.stage === 2 ? 'قلعه تخریب شد. ' : ''}باید همین الان دفاع کنی:</div>
        <div class="rps-row" id="rpsRow"></div>
      </div></div>`);
      const row = m.querySelector('#rpsRow');
      RPS.forEach(o => {
        const b = el(`<button class="rps-btn" title="${o.label}">${o.icon}</button>`);
        b.onclick = () => submitBattleChoice('defender', o.k);
        row.appendChild(b);
      });
      wrap.appendChild(m);
    }
  }
  if (state.pendingColonyChoice) {
    const pc = state.pendingColonyChoice;
    const defP = playerById(pc.defenderId), atkP = playerById(pc.attackerId);
    if (pc.defenderId === myId && !pc.defenderDecision) {
      const m = el(`<div class="modal-bg"><div class="modal">
        <h3 class="display" style="color:var(--danger)">پایتختت سقوط کرد!</h3>
        <div class="small">مستعمره‌ی ${atkP.name} بشی (۵ نوبت) یا منحل بشی؟</div>
        <div class="btn-row" style="justify-content:center;margin-top:14px">
          <button class="btn btn-gold" id="bColony">⛓️ مستعمره بشم</button>
          <button class="btn btn-danger" id="bDissolve">💀 منحل بشم</button>
        </div>
      </div></div>`);
      m.querySelector('#bColony').onclick = () => submitColonyChoice('colony');
      m.querySelector('#bDissolve').onclick = () => submitColonyChoice('dissolve');
      wrap.appendChild(m);
    } else if (pc.defenderDecision === 'colony' && pc.attackerId === myId) {
      const m = el(`<div class="modal-bg"><div class="modal">
        <h3 class="display" style="color:var(--accent)">${defP.name} می‌خواد مستعمره‌ی تو بشه</h3>
        <div class="small">قبول = ۵ نوبت بدون حمله به تو. رد = منحل می‌شه.</div>
        <div class="btn-row" style="justify-content:center;margin-top:14px">
          <button class="btn btn-gold" id="bAccept">✅ قبول</button>
          <button class="btn btn-danger" id="bReject">❌ رد</button>
        </div>
      </div></div>`);
      m.querySelector('#bAccept').onclick = () => submitOverlordDecision(true);
      m.querySelector('#bReject').onclick = () => submitOverlordDecision(false);
      wrap.appendChild(m);
    }
  }
  if (ui.actionMode === 'gift-choose') {
    const c = cityById(ui.giftFromCity);
    const others = state.players.filter(p => p.id !== myId);
    const m = el(`<div class="modal-bg"><div class="modal">
      <h3 class="display" style="color:var(--accent)">هدیه ${cityDisplayName(c)} به چه کسی؟</h3>
      <div class="btn-row" style="justify-content:center;flex-direction:column;align-items:stretch" id="gl"></div>
      <button class="btn btn-danger" id="gX" style="margin-top:10px">انصراف</button>
    </div></div>`);
    const gl = m.querySelector('#gl');
    others.forEach(p => {
      const label = p.alive ? p.name : '☠️ ' + p.name + ' (بازگرداندن)';
      const b = el(`<button class="btn">${label}</button>`);
      b.onclick = () => doGift(c.id, p.id);
      gl.appendChild(b);
    });
    m.querySelector('#gX').onclick = () => { ui.actionMode = null; ui.giftFromCity = null; render(); };
    wrap.appendChild(m);
  }
}

function startNewGameFlow() {
  try {
    if (code) localStorage.removeItem('myid-' + code);
    localStorage.removeItem('lastCode');
  } catch (e) {}
  if (pollTimer) clearInterval(pollTimer);
  code = null; myId = null; state = null;
  ui.setupName = ''; ui.setupCapital = ''; ui.setupColor = null; ui.joinCode = '';
  view = 'landing';
  render();
}
function renderWinner() {
  const w = state.winnerId ? playerById(state.winnerId) : null;
  const node = el(`<div class="card winner-screen">
    <div class="crown">👑</div>
    <h1 class="main-title">${w ? w.name + ' برنده شد!' : 'بازی بدون برنده پایان یافت'}</h1>
    ${w ? `<div class="small">پایتخت: ${w.capital}</div>` : ''}
    <div class="btn-row" style="justify-content:center;margin-top:10px">
      <button class="btn btn-gold" id="newGameBtn">🎮 بازی جدید</button>
    </div>
    <div class="log-box" style="margin:20px auto;max-width:420px;text-align:right">
      ${[...state.log].slice(-30).reverse().map(l => `<div class="log-line">${l.text}</div>`).join('')}
    </div>
  </div>`);
  node.querySelector('#newGameBtn').onclick = startNewGameFlow;
  return node;
}

/* ===================== POLLING ===================== */
function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    if (!code) return;
    const fresh = await loadRoom(code);
    if (fresh && (!state || fresh.version !== state.version)) {
      state = fresh;
      if (state.phase === 'playing' || state.phase === 'ended') view = 'game';
      render();
    }
  }, 1200);
}

async function tryAutoResume() {
  let lastCode;
  try { lastCode = localStorage.getItem('lastCode'); } catch (e) { return false; }
  if (!lastCode) return false;
  const savedId = await loadMyId(lastCode);
  if (!savedId) return false;
  const s = await loadRoom(lastCode);
  if (!s) return false;
  if (!s.players.some(p => p.id === savedId)) return false;
  code = lastCode; myId = savedId; state = s;
  view = (s.phase === 'lobby') ? 'lobby' : 'game';
  startPolling();
  return true;
}
function leaveSession() {
  try {
    if (code) localStorage.removeItem('myid-' + code);
    localStorage.removeItem('lastCode');
  } catch (e) {}
  if (pollTimer) clearInterval(pollTimer);
  code = null; myId = null; state = null; view = 'landing';
  render();
}

(async function init() {
  const params = new URLSearchParams(window.location.search);
  const urlCode = params.get('code');
  const resumed = await tryAutoResume();
  if (!resumed && urlCode && /^\d{6}$/.test(urlCode)) { ui.joinCode = urlCode; view = 'join'; }
  render();
})();
