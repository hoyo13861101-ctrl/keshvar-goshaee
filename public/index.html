<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>کشورگشایی</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&display=swap');
:root{
  --bg:#e7e2d6;--shadow-dark:#c3bcac;--shadow-light:#ffffff;
  --ink:#4a4335;--ink-soft:#8a8071;--accent:#b9834a;
  --accent-bg:#e3cfa2;--accent-shadow-d:#c2ab7c;--accent-shadow-l:#ffffff;
  --danger:#b5564a;--danger-bg:#e3b8ae;--danger-shadow-d:#c2938a;
  --ok:#5c8a5a;--radius:22px;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Vazirmatn',sans-serif;min-height:100vh;}
h1,h2,h3,.display{font-family:'Vazirmatn',sans-serif;font-weight:800;letter-spacing:.2px;}
#app{max-width:1220px;margin:0 auto;padding:18px 14px 60px;}
.card{background:var(--bg);border-radius:var(--radius);box-shadow:9px 9px 18px var(--shadow-dark),-9px -9px 18px var(--shadow-light);border:none;padding:22px;}
.title-row{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:6px;}
.crown{font-size:26px;}
h1.main-title{font-size:30px;color:var(--accent);text-align:center;margin:6px 0 2px;font-weight:900;}
.subtitle{text-align:center;color:var(--ink-soft);font-size:13px;margin-bottom:22px;}
label{display:block;font-size:13px;color:var(--ink-soft);margin:14px 0 8px;font-weight:600;}
input[type=text],select{width:100%;padding:12px 14px;border-radius:14px;border:none;background:var(--bg);color:var(--ink);font-family:inherit;font-size:14px;outline:none;box-shadow:inset 4px 4px 8px var(--shadow-dark),inset -4px -4px 8px var(--shadow-light);}
.btn{cursor:pointer;border:none;border-radius:14px;padding:11px 18px;background:var(--bg);color:var(--ink);font-family:inherit;font-size:14px;font-weight:700;transition:.12s;box-shadow:5px 5px 10px var(--shadow-dark),-5px -5px 10px var(--shadow-light);}
.btn:hover:not(:disabled){box-shadow:3px 3px 7px var(--shadow-dark),-3px -3px 7px var(--shadow-light);}
.btn:active:not(:disabled){box-shadow:inset 4px 4px 8px var(--shadow-dark),inset -4px -4px 8px var(--shadow-light);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-gold{background:var(--accent-bg);color:#5c431c;box-shadow:5px 5px 10px var(--accent-shadow-d),-5px -5px 10px var(--accent-shadow-l);}
.btn-gold:active:not(:disabled){box-shadow:inset 4px 4px 8px var(--accent-shadow-d),inset -4px -4px 8px var(--accent-shadow-l);}
.btn-danger{background:var(--danger-bg);color:#6b241a;box-shadow:5px 5px 10px var(--danger-shadow-d),-5px -5px 10px #fff;}
.btn-danger:active:not(:disabled){box-shadow:inset 4px 4px 8px var(--danger-shadow-d),inset -4px -4px 8px #fff;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
.small{font-size:12px;color:var(--ink-soft);}
.hint{font-size:12px;color:var(--ink-soft);margin-top:8px;}
.tabs{display:flex;gap:6px;margin-bottom:10px;}
.tab{padding:7px 16px;border-radius:20px;cursor:pointer;font-size:13px;color:var(--ink-soft);box-shadow:3px 3px 6px var(--shadow-dark),-3px -3px 6px var(--shadow-light);}
.tab.active{box-shadow:inset 3px 3px 6px var(--shadow-dark),inset -3px -3px 6px var(--shadow-light);color:var(--accent);font-weight:800;}
.color-swatches{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
.swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;box-shadow:4px 4px 8px var(--shadow-dark),-4px -4px 8px var(--shadow-light);}
.swatch.selected{border-color:#fff;box-shadow:inset 3px 3px 6px rgba(0,0,0,.35);}
.swatch.taken{opacity:.25;cursor:not-allowed;}
.lobby-players{display:flex;flex-direction:column;gap:10px;margin:16px 0;}
.lobby-player{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:14px;box-shadow:inset 3px 3px 6px var(--shadow-dark),inset -3px -3px 6px var(--shadow-light);}
.dot{width:16px;height:16px;border-radius:50%;flex:none;box-shadow:1px 1px 2px rgba(0,0,0,.3);}
.code-display{text-align:center;font-size:34px;letter-spacing:6px;color:var(--accent);font-weight:900;margin:6px 0 2px;}
.top-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.turn-banner{border-radius:18px;padding:10px 16px;display:flex;align-items:center;gap:14px;box-shadow:6px 6px 12px var(--shadow-dark),-6px -6px 12px var(--shadow-light);}
.turn-banner .dot{width:14px;height:14px;}
.timer-badge{display:flex;align-items:center;gap:6px;border-radius:50px;padding:8px 16px;box-shadow:inset 3px 3px 6px var(--shadow-dark),inset -3px -3px 6px var(--shadow-light);font-weight:800;color:var(--accent);white-space:nowrap;}
.timer-badge.warn{color:var(--danger);}
.players-strip{display:flex;gap:8px;flex-wrap:wrap;}
.player-chip{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:20px;font-size:12px;box-shadow:3px 3px 6px var(--shadow-dark),-3px -3px 6px var(--shadow-light);}
.player-chip.dead{opacity:.35;text-decoration:line-through;}
.player-chip.current{box-shadow:inset 3px 3px 6px var(--shadow-dark),inset -3px -3px 6px var(--shadow-light);color:var(--accent);font-weight:800;}
.layout{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;}
.map-wrap{flex:1;min-width:340px;}
.side-panel{width:300px;flex:none;display:flex;flex-direction:column;gap:12px;}
/* MAP */
.map-card{border-radius:28px;padding:14px;box-shadow:inset 8px 8px 16px var(--shadow-dark),inset -8px -8px 16px var(--shadow-light);overflow:visible;position:relative;}
.map-svg{width:100%;height:auto;display:block;overflow:visible;}
.territory-path{cursor:pointer;transition:filter .15s;stroke:#1a1208;stroke-width:2;stroke-linejoin:round;paint-order:stroke fill;}
.territory-path:hover{filter:brightness(1.18);}
.territory-path.selectable{stroke:#f5c842;stroke-width:4;animation:pulseGold 1s infinite alternate;}
.territory-path.selected{stroke:#fff;stroke-width:5;}
@keyframes pulseGold{from{filter:drop-shadow(0 0 4px rgba(245,200,66,.4));}to{filter:drop-shadow(0 0 12px rgba(245,200,66,1));}}
/* FIX: labels همیشه روی همه paths */
.labels-layer{pointer-events:none;}
.t-name{font-family:'Vazirmatn',sans-serif;font-size:10px;font-weight:800;fill:#fff;text-anchor:middle;dominant-baseline:central;paint-order:stroke fill;stroke:rgba(0,0,0,.65);stroke-width:3px;}
.t-name.is-capital{fill:#ffe87a;font-size:10px;}
.t-owner{font-family:'Vazirmatn',sans-serif;font-size:8.5px;font-weight:600;fill:rgba(255,255,255,.92);text-anchor:middle;dominant-baseline:central;paint-order:stroke fill;stroke:rgba(0,0,0,.55);stroke-width:2.5px;}
.t-icon{font-size:12px;text-anchor:middle;dominant-baseline:central;}
.map-legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;font-size:11px;color:var(--ink-soft);}
.legend-item{display:flex;align-items:center;gap:5px;}
.legend-dot{width:12px;height:12px;border-radius:3px;border:1px solid rgba(0,0,0,.2);}
/* capital pick */
.cap-pick-bar{background:var(--bg);border-radius:14px;padding:10px 14px;margin-bottom:8px;box-shadow:4px 4px 8px var(--shadow-dark),-4px -4px 8px var(--shadow-light);font-size:13px;text-align:center;}
.cap-timer-bar{height:6px;border-radius:3px;background:var(--accent-bg);margin-top:6px;overflow:hidden;box-shadow:inset 2px 2px 4px var(--shadow-dark),inset -2px -2px 4px var(--shadow-light);}
.cap-timer-fill{height:100%;background:var(--accent);transition:width .9s linear;}
/* actions */
.action-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.action-btns .btn{width:100%;font-size:12px;padding:8px 4px;}
.log-box{border-radius:14px;padding:10px 12px;box-shadow:inset 3px 3px 6px var(--shadow-dark),inset -3px -3px 6px var(--shadow-light);height:190px;overflow-y:auto;font-size:12.5px;display:flex;flex-direction:column;gap:6px;}
.log-line{color:var(--ink-soft);padding-bottom:5px;border-bottom:1px dashed var(--shadow-dark);}
.log-line b{color:var(--ink);}
.chat-input-row{display:flex;gap:6px;margin-top:8px;}
.chat-input-row input{flex:1;}
.emoji-row{display:flex;gap:6px;margin-top:8px;}
.emoji-row button{background:var(--bg);border:none;border-radius:10px;font-size:16px;padding:5px 10px;cursor:pointer;box-shadow:3px 3px 6px var(--shadow-dark),-3px -3px 6px var(--shadow-light);}
.modal-bg{position:fixed;inset:0;background:rgba(60,52,38,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;}
.modal{background:var(--bg);border-radius:26px;padding:24px;max-width:420px;width:100%;text-align:center;box-shadow:12px 12px 24px var(--shadow-dark),-12px -12px 24px var(--shadow-light);}
.rps-row{display:flex;gap:14px;justify-content:center;margin-top:18px;}
.rps-btn{font-size:38px;background:var(--bg);border:none;border-radius:18px;width:76px;height:76px;cursor:pointer;box-shadow:6px 6px 12px var(--shadow-dark),-6px -6px 12px var(--shadow-light);}
.rps-btn:active{box-shadow:inset 4px 4px 8px var(--shadow-dark),inset -4px -4px 8px var(--shadow-light);}
.banner-wait{border-radius:14px;padding:12px;font-size:13px;text-align:center;margin-bottom:10px;color:var(--accent);box-shadow:inset 3px 3px 6px var(--shadow-dark),inset -3px -3px 6px var(--shadow-light);}
.winner-screen{text-align:center;padding:50px 20px;}
.winner-screen .crown{font-size:70px;}
.footnote{font-size:11.5px;color:var(--ink-soft);margin-top:26px;line-height:2;padding-top:14px;border-top:1px dashed var(--shadow-dark);}
@media(max-width:760px){.side-panel{width:100%;}}
</style>
</head>
<body><div id="app"></div>
<script>
/* ===== SOUND ENGINE (Web Audio API — بدون نیاز به فایل خارجی) ===== */
const SFX = (() => {
  let ctx = null;
  function getCtx(){
    if(!ctx) ctx = new (window.AudioContext||window.webkitAudioContext)();
    if(ctx.state==='suspended') ctx.resume();
    return ctx;
  }
  // ساخت نویز
  function noise(ac, dur){
    const buf = ac.createBuffer(1, ac.sampleRate*dur, ac.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src = ac.createBufferSource(); src.buffer=buf; return src;
  }
  // ساخت اسیلاتور
  function osc(ac, type, freq, detune=0){
    const o=ac.createOscillator(); o.type=type; o.frequency.value=freq;
    if(detune) o.detune.value=detune; return o;
  }

  return {
    // ⚔️ حمله — طبل جنگی: ضربه کوتاه باس + خش‌خش
    attack(){
      try{
        const ac=getCtx(), t=ac.currentTime;
        // ضربه باس
        const osc1=osc(ac,'sine',80); const g1=ac.createGain();
        osc1.frequency.setValueAtTime(120,t); osc1.frequency.exponentialRampToValueAtTime(40,t+0.18);
        g1.gain.setValueAtTime(1,t); g1.gain.exponentialRampToValueAtTime(0.001,t+0.25);
        osc1.connect(g1); g1.connect(ac.destination);
        osc1.start(t); osc1.stop(t+0.25);
        // نویز طبل
        const n=noise(ac,0.15); const gn=ac.createGain(); const flt=ac.createBiquadFilter();
        flt.type='bandpass'; flt.frequency.value=200; flt.Q.value=0.8;
        gn.gain.setValueAtTime(0.6,t); gn.gain.exponentialRampToValueAtTime(0.001,t+0.15);
        n.connect(flt); flt.connect(gn); gn.connect(ac.destination);
        n.start(t); n.stop(t+0.15);
        // ضربه دوم بعد از 0.2 ثانیه
        const osc2=osc(ac,'sine',80); const g2=ac.createGain();
        osc2.frequency.setValueAtTime(100,t+0.22); osc2.frequency.exponentialRampToValueAtTime(35,t+0.38);
        g2.gain.setValueAtTime(0.7,t+0.22); g2.gain.exponentialRampToValueAtTime(0.001,t+0.4);
        osc2.connect(g2); g2.connect(ac.destination);
        osc2.start(t+0.22); osc2.stop(t+0.4);
      }catch(e){}
    },

    // 🏰 ساخت قلعه — صدای ساخت‌وساز: چکش‌های پیاپی
    build(){
      try{
        const ac=getCtx(), t=ac.currentTime;
        [0, 0.18, 0.36, 0.54].forEach((delay, i)=>{
          const o=osc(ac,'square', 300+i*30); const g=ac.createGain();
          const flt=ac.createBiquadFilter(); flt.type='lowpass'; flt.frequency.value=800;
          g.gain.setValueAtTime(0,t+delay); g.gain.linearRampToValueAtTime(0.4,t+delay+0.02);
          g.gain.exponentialRampToValueAtTime(0.001,t+delay+0.12);
          o.connect(flt); flt.connect(g); g.connect(ac.destination);
          o.start(t+delay); o.stop(t+delay+0.12);
        });
      }catch(e){}
    },

    // 🏛️ انتقال پایتخت — شیپور: آرپژ صعودی
    capitalMove(){
      try{
        const ac=getCtx(), t=ac.currentTime;
        const notes=[392,494,587,784]; // G4 B4 D5 G5
        notes.forEach((freq,i)=>{
          const o=osc(ac,'sawtooth',freq); const g=ac.createGain();
          const flt=ac.createBiquadFilter(); flt.type='lowpass'; flt.frequency.value=2000;
          g.gain.setValueAtTime(0,t+i*0.12); g.gain.linearRampToValueAtTime(0.35,t+i*0.12+0.04);
          g.gain.exponentialRampToValueAtTime(0.001,t+i*0.12+0.18);
          o.connect(flt); flt.connect(g); g.connect(ac.destination);
          o.start(t+i*0.12); o.stop(t+i*0.12+0.2);
        });
      }catch(e){}
    },

    // ⏭️ پایان نوبت — زنگ: ding کوتاه
    endTurn(){
      try{
        const ac=getCtx(), t=ac.currentTime;
        const o=osc(ac,'sine',880); const g=ac.createGain();
        g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.6);
        o.connect(g); g.connect(ac.destination);
        o.start(t); o.stop(t+0.65);
        // هارمونیک
        const o2=osc(ac,'sine',1320); const g2=ac.createGain();
        g2.gain.setValueAtTime(0.2,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.4);
        o2.connect(g2); g2.connect(ac.destination);
        o2.start(t); o2.stop(t+0.45);
      }catch(e){}
    },

    // 👑 پیروزی — فانفار پیروزی
    victory(){
      try{
        const ac=getCtx(), t=ac.currentTime;
        const seq=[[523,.12],[659,.12],[784,.12],[1047,.4]]; // C E G C
        let dt=0;
        seq.forEach(([f,dur])=>{
          const o=osc(ac,'sawtooth',f); const g=ac.createGain();
          const flt=ac.createBiquadFilter(); flt.type='lowpass'; flt.frequency.value=3000;
          g.gain.setValueAtTime(0.4,t+dt); g.gain.exponentialRampToValueAtTime(0.001,t+dt+dur);
          o.connect(flt); flt.connect(g); g.connect(ac.destination);
          o.start(t+dt); o.stop(t+dt+dur+0.05);
          dt+=dur*0.85;
        });
      }catch(e){}
    },

    // 💀 شکست/منحل‌شدن — صدای نزولی تاریک
    defeat(){
      try{
        const ac=getCtx(), t=ac.currentTime;
        const o=osc(ac,'sawtooth',220); const g=ac.createGain();
        o.frequency.setValueAtTime(220,t); o.frequency.exponentialRampToValueAtTime(60,t+0.8);
        g.gain.setValueAtTime(0.4,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.9);
        o.connect(g); g.connect(ac.destination);
        o.start(t); o.stop(t+0.9);
      }catch(e){}
    },

    // 🏆 تصرف شهر — صدای کوتاه موفقیت
    capture(){
      try{
        const ac=getCtx(), t=ac.currentTime;
        [523,659].forEach((f,i)=>{
          const o=osc(ac,'triangle',f); const g=ac.createGain();
          g.gain.setValueAtTime(0.35,t+i*0.1); g.gain.exponentialRampToValueAtTime(0.001,t+i*0.1+0.2);
          o.connect(g); g.connect(ac.destination);
          o.start(t+i*0.1); o.stop(t+i*0.1+0.22);
        });
      }catch(e){}
    },

    // 🛡️ دفاع موفق — صدای سپر
    defend(){
      try{
        const ac=getCtx(), t=ac.currentTime;
        const n=noise(ac,0.1); const g=ac.createGain(); const flt=ac.createBiquadFilter();
        flt.type='highpass'; flt.frequency.value=3000;
        g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
        n.connect(flt); flt.connect(g); g.connect(ac.destination);
        n.start(t); n.stop(t+0.15);
        const o=osc(ac,'sine',440); const g2=ac.createGain();
        g2.gain.setValueAtTime(0.3,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.2);
        o.connect(g2); g2.connect(ac.destination);
        o.start(t); o.stop(t+0.2);
      }catch(e){}
    },

    // 🕊️ هدیه / بازگشت — صدای لطیف
    gift(){
      try{
        const ac=getCtx(), t=ac.currentTime;
        [523,659,784,1047].forEach((f,i)=>{
          const o=osc(ac,'sine',f); const g=ac.createGain();
          g.gain.setValueAtTime(0,t+i*0.08); g.gain.linearRampToValueAtTime(0.25,t+i*0.08+0.03);
          g.gain.exponentialRampToValueAtTime(0.001,t+i*0.08+0.25);
          o.connect(g); g.connect(ac.destination);
          o.start(t+i*0.08); o.stop(t+i*0.08+0.28);
        });
      }catch(e){}
    }
  };
})();

/* ===== STORAGE ===== */
async function apiGet(k){try{const r=await fetch('/api/state/'+encodeURIComponent(k));if(!r.ok)return null;return(await r.json()).value;}catch{return null;}}
async function apiSet(k,v){try{await fetch('/api/state/'+encodeURIComponent(k),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({value:v})});}catch(e){console.error(e);}}
async function loadRoom(c){return(await apiGet('room-'+c))||null;}
async function saveRoom(s){s.updatedAt=Date.now();await apiSet('room-'+s.code,s);}
async function saveMyId(c,id){try{localStorage.setItem('myid-'+c,id);}catch{}}
async function loadMyId(c){try{return localStorage.getItem('myid-'+c);}catch{return null;}}

/* ===== CONSTANTS ===== */
const COLORS=[{hex:'#b23a34',name:'قرمز'},{hex:'#2f5f8a',name:'آبی'},{hex:'#4c7a4a',name:'سبز'},{hex:'#6b4c8a',name:'بنفش'},{hex:'#c07a2e',name:'نارنجی'}];
const RPS=[{k:'rock',icon:'🪨',label:'سنگ'},{k:'paper',icon:'📄',label:'کاغذ'},{k:'scissors',icon:'✂️',label:'قیچی'}];
const TURN_SECONDS=60;
const CAPITAL_PICK_SECONDS=120;
const CAPITAL_MOVE_ROUNDS=1; // انتقال پایتخت ۱ دور طول می‌کشد

function rpsWinner(a,b){if(a===b)return'tie';if((a==='rock'&&b==='scissors')||(a==='scissors'&&b==='paper')||(a==='paper'&&b==='rock'))return'a';return'b';}
function genCode(){return String(Math.floor(100000+Math.random()*900000));}
function uid(){return Math.random().toString(36).slice(2,10);}

/* ===== APP STATE ===== */
let view='landing',code=null,myId=null,state=null,pollTimer=null,timeoutHandled=false;
let ui={setupName:'',setupColor:null,joinCode:'',maxPlayers:3,
  actionMode:null,selectedCity:null,giftFromCity:null,activeTab:'log',chatText:''};

function el(h){const d=document.createElement('div');d.innerHTML=h.trim();return d.firstElementChild;}
function render(){
  const app=document.getElementById('app');app.innerHTML='';
  let node;
  if(view==='landing')node=renderLanding();
  else if(view==='create')node=renderCreate();
  else if(view==='join')node=renderJoin();
  else if(view==='join-form')node=renderJoinForm();
  else if(view==='lobby')node=renderLobby();
  else if(view==='game')node=renderGame();
  app.appendChild(node);
}

/* ===== LANDING ===== */
function renderLanding(){
  const c=el(`<div class="card"><div class="title-row"><span class="crown">🏰</span></div>
    <h1 class="main-title">کِشورگُشایی</h1>
    <div class="subtitle">نبرد سرزمین‌ها با سنگ، کاغذ، قیچی — ۲ تا ۵ بازیکن، آنلاین</div>
    <div class="btn-row" style="justify-content:center">
      <button class="btn btn-gold" id="btnNew">ساخت بازی جدید</button>
      <button class="btn" id="btnJoin">پیوستن با کد اتاق</button>
    </div></div>`);
  c.querySelector('#btnNew').onclick=()=>{view='create';render();};
  c.querySelector('#btnJoin').onclick=()=>{view='join';render();};
  return c;
}

/* ===== CREATE ===== */
function renderCreate(){
  const c=el(`<div class="card">

/* ===== JOIN ===== */
function renderJoin(){
  const c=el(`<div class="card">
    <h2 class="display" style="text-align:center;color:var(--accent)">پیوستن به اتاق</h2>
    <label>کد اتاق (۶ رقمی)</label><input type="text" id="jc" placeholder="مثلاً 482913" maxlength="6">
    <div class="btn-row"><button class="btn btn-gold" id="go">ادامه</button><button class="btn" id="back">بازگشت</button></div>
    <div class="hint" id="err" style="color:var(--danger);"></div></div>`);
  c.querySelector('#jc').value=ui.joinCode;
  c.querySelector('#jc').oninput=e=>ui.joinCode=e.target.value.trim();
  c.querySelector('#back').onclick=()=>{view='landing';render();};
  c.querySelector('#go').onclick=async()=>{
    const s=await loadRoom(ui.joinCode);
    if(!s){c.querySelector('#err').textContent='اتاقی با این کد پیدا نشد.';return;}
    const savedId=await loadMyId(ui.joinCode);
    if(s.phase!=='lobby'){
      if(savedId&&s.players.some(p=>p.id===savedId)){
        code=ui.joinCode;myId=savedId;state=s;
        try{localStorage.setItem('lastCode',code);}catch{}
        view='game';startPolling();render();return;
      }
      c.querySelector('#err').textContent='این بازی شروع شده.';return;
    }
    if(s.players.length>=s.maxPlayers){c.querySelector('#err').textContent='اتاق پر است.';return;}
    code=ui.joinCode;state=s;view='join-form';render();
  };
  return c;
}

  c.querySelector('#copyLink').onclick=()=>{const link=window.location.origin+window.location.pathname+'?code='+code;navigator.clipboard?.writeText(link).then(()=>alert('لینک کپی شد:\n'+link)).catch(()=>alert(link));};
  const pl=c.querySelector('#plist');
  state.players.forEach(p=>{pl.appendChild(el(`<div class="lobby-player"><div class="dot" style="background:${p.color}"></div><div><b>${p.name}</b>${p.isBot?' 🤖':''} ${p.id===state.hostId?'👑':''} ${p.id===myId?'(تو)':''}</div></div>`));});

  if(addBotBtn){addBotBtn.onclick=async()=>{
    const level=c.querySelector('#botLevel').value;
    const usedColors=state.players.map(p=>p.color);
    const colorObj=COLORS.find(cc=>!usedColors.includes(cc.hex));
    if(!colorObj){alert('رنگ آزادی نمانده.');return;}
    const ll=level==='easy'?'آسان':level==='medium'?'متوسط':'سخت';
    state.players.push({id:'bot-'+uid(),name:'ربات '+ll,color:colorObj.hex,alive:true,colonyOf:null,colonyTurnsLeft:0,isBot:true,botLevel:level,capitalCityId:null,pendingCapitalMove:null});
    state.version=(state.version||0)+1;await saveRoom(state);render();
  };}
  if(isHost){c.querySelector('#startBtn').onclick=async()=>{startGame();await saveRoom(state);view='game';render();};}
  return c;
}

const SLOT_ACTIVE={2:[0,1],3:[0,1,2],4:[0,1,3,4],5:[0,1,2,3,4]};

function buildMap(players){
  const n=players.length;
  const activeSlots=SLOT_ACTIVE[n]||SLOT_ACTIVE[5];
  const activeIds=Object.entries(MAP_DEFS).filter(([,td])=>activeSlots.includes(td.slot)).map(([id])=>id);
  const cities=[];
  players.forEach((pl,idx)=>{
    const slot=activeSlots[idx];
    Object.entries(MAP_DEFS).forEach(([tid,td])=>{
      if(td.slot!==slot)return;
      cities.push({
        id:tid,ownerId:pl.id,
        isCapital:false,         // انتخاب پایتخت توسط بازیکن
        hasCastle:false,construction:null,
        mapPath:td.path,mapCx:td.cx,mapCy:td.cy,mapName:td.name,
        // FIX: همه همسایه‌های فعال — نه فقط مرز بین slot‌ها
        neighborIds:td.nb.filter(nid=>activeIds.includes(nid)),
        row:slot,col:0
      });
    });
  });
  return{cities};
}

function startGame(){
  const{cities}=buildMap(state.players);
  state.cities=cities;
  state.phase='capital-pick';
  state.capitalPickStartedAt=Date.now();
  state.currentPlayerIndex=0;state.turnCount=1;state.roundNumber=1;
  state.roundAnchorId=state.players[0].id;
  state.usedAttackThisTurn=false;state.usedBuildThisTurn=false;state.usedCapMoveThisTurn=false;
  state.pendingBattle=null;state.pendingColonyChoice=null;state.winnerId=null;
  state.log=[{turn:0,text:'🗺️ بازی شروع شد! هر بازیکن ۲ دقیقه فرصت دارد پایتخت خود را روی نقشه انتخاب کند.'}];
  state.chat=[];
  state.players.forEach(p=>{p.colonyOf=null;p.colonyTurnsLeft=0;p.capitalCityId=null;p.pendingCapitalMove=null;});
  state.version=(state.version||0)+1;
}

function allCapitalsChosen(){return state.players.every(p=>p.isBot||p.capitalCityId);}
function assignBotCapitals(){
  state.players.forEach(p=>{
    if(!p.isBot||p.capitalCityId)return;
    const opts=state.cities.filter(c=>c.ownerId===p.id);
    if(opts.length){const pick=opts[Math.floor(Math.random()*opts.length)];p.capitalCityId=pick.id;pick.isCapital=true;
      state.log.push({turn:0,text:'🤖 '+p.name+' شهر '+pick.mapName+' را پایتخت کرد.'});}
  });
}
async function finishCapitalPick(){
  assignBotCapitals();
  // بازیکنانی که انتخاب نکردند → اولین شهرشان
  state.players.forEach(p=>{
    if(p.isBot||p.capitalCityId)return;
    const opts=state.cities.filter(c=>c.ownerId===p.id);
    if(opts.length){opts[0].isCapital=true;p.capitalCityId=opts[0].id;
      state.log.push({turn:0,text:'⏰ '+p.name+' پایتخت انتخاب نکرد — خودکار تعیین شد.'});}
  });
  state.phase='playing';
  state.turnStartedAt=Date.now();
  state.log.push({turn:1,text:'⚔️ بازی «کِشورگُشایی» آغاز شد! نوبت اول با '+state.players[0].name+' است.'});
  await pushState();
}

/* ===== HELPERS ===== */
function cityById(id){return state.cities.find(c=>c.id===id);}
function playerById(id){return state.players.find(p=>p.id===id);}
function currentPlayer(){return state.players[state.currentPlayerIndex];}
function isMyTurn(){return currentPlayer()&&currentPlayer().id===myId;}

// FIX: همه همسایه‌های فعال به‌عنوان هدف حمله
function landNeighbors(city){
  if(city.neighborIds)return city.neighborIds.map(nid=>cityById(nid)).filter(Boolean);
  return[];
}
function attackTargets(city){
  const owner=playerById(city.ownerId);
  const targets=new Map();
  landNeighbors(city).forEach(n=>{
    if(n.ownerId===city.ownerId)return;
    if(owner&&owner.colonyOf&&n.ownerId===owner.colonyOf)return;
    // FIX: بازیکن منحل‌شده نمی‌تواند دفاع کند — شهرهایش قابل تصرف بدون نبرد
    targets.set(n.id,n);
  });
  return[...targets.values()];
}
function cityCount(pid){return state.cities.filter(c=>c.ownerId===pid).length;}

function checkElimination(){
  state.players.forEach(p=>{
    if(p.alive&&cityCount(p.id)===0){p.alive=false;
      state.log.push({turn:state.turnCount,text:'💀 '+p.name+' تمام سرزمین‌ها را از دست داد و منحل شد.'});}
  });
  const ap=state.players.filter(p=>p.alive);
  if(ap.length<=1&&state.phase==='playing'){
    state.phase='ended';state.winnerId=ap.length===1?ap[0].id:null;
    state.log.push({turn:state.turnCount,text:ap.length===1?'👑 '+ap[0].name+' برنده شد!':'🏳️ بازی بدون برنده تمام شد.'});
  }
}

function advanceConstructions(){
  state.cities.forEach(c=>{
    if(c.construction&&(state.roundNumber||1)-c.construction.startRound>=2){
      c.hasCastle=true;
      state.log.push({turn:state.turnCount,text:'🏰 قلعه در '+cityDisplayName(c)+' تکمیل شد.'});
      c.construction=null;
    }
  });
}

// FIX: انتقال پایتخت معلق را تکمیل کن
function advanceCapitalMoves(){
  state.players.forEach(p=>{
    if(!p.pendingCapitalMove)return;
    const pm=p.pendingCapitalMove;
    if((state.roundNumber||1)-pm.startRound>=CAPITAL_MOVE_ROUNDS){
      const oldCap=cityById(pm.fromCityId);
      const newCap=cityById(pm.toCityId);
      if(oldCap)oldCap.isCapital=false;
      if(newCap&&newCap.ownerId===p.id){
        newCap.isCapital=true;p.capitalCityId=pm.toCityId;
        state.log.push({turn:state.turnCount,text:'🏛️ انتقال پایتخت '+p.name+' به '+newCap.mapName+' تکمیل شد!'});
      }else{
        if(oldCap){oldCap.isCapital=true;} // برگشت
        state.log.push({turn:state.turnCount,text:'❌ انتقال پایتخت '+p.name+' ناموفق بود (شهر مقصد از دست رفت).'});
      }
      p.pendingCapitalMove=null;
    }
  });
}

function cityDisplayName(c){const own=playerById(c.ownerId);return(c.isCapital?'★ ':'')+c.mapName+' ('+(own?own.name:'بی‌صاحب')+')';}
async function pushState(){state.version=(state.version||0)+1;await saveRoom(state);render();}

function nextTurn(){
  checkElimination();if(state.phase!=='playing')return;
  let idx=state.currentPlayerIndex;
  for(let i=0;i<state.players.length;i++){idx=(idx+1)%state.players.length;if(state.players[idx].alive)break;}
  state.currentPlayerIndex=idx;state.turnCount++;
  state.usedAttackThisTurn=false;state.usedBuildThisTurn=false;state.usedCapMoveThisTurn=false;
  state.turnStartedAt=Date.now();
  const cp=currentPlayer();
  if(!state.roundAnchorId||!playerById(state.roundAnchorId)||!playerById(state.roundAnchorId).alive)state.roundAnchorId=cp.id;
  if(cp.id===state.roundAnchorId)state.roundNumber=(state.roundNumber||1)+1;
  advanceConstructions();
  advanceCapitalMoves();
  if(cp.colonyOf){cp.colonyTurnsLeft=(cp.colonyTurnsLeft||0)-1;
    if(cp.colonyTurnsLeft<=0){state.log.push({turn:state.turnCount,text:'🔓 '+cp.name+' آزاد شد.'});cp.colonyOf=null;cp.colonyTurnsLeft=0;}}
  state.log.push({turn:state.turnCount,text:'▶️ نوبت '+cp.name+' رسید.'});
}

/* ===== ACTIONS ===== */
async function declareAttack(srcId,tgtId){
  const tgt=cityById(tgtId);
  const defP=playerById(tgt.ownerId);
  if(defP&&!defP.alive){
    tgt.ownerId=myId;tgt.hasCastle=false;
    state.usedAttackThisTurn=true;
    SFX.capture();
    state.log.push({turn:state.turnCount,text:'🏳️ '+currentPlayer().name+' سرزمین رهاشده '+cityDisplayName(tgt)+' را تصرف کرد.'});
    ui.actionMode=null;ui.selectedCity=null;checkElimination();await pushState();return;
  }
  SFX.attack();
  state.pendingBattle={attackerCity:srcId,defenderCity:tgtId,attackerId:myId,defenderId:tgt.ownerId,stage:1,attackerChoice:null,defenderChoice:null};
  state.usedAttackThisTurn=true;
  state.log.push({turn:state.turnCount,text:'⚔️ '+currentPlayer().name+' به '+cityDisplayName(tgt)+' حمله کرد.'});
  ui.actionMode=null;ui.selectedCity=null;await pushState();
}
async function doNeutralAttack(srcId,tgtId){
  const tgt=cityById(tgtId);tgt.ownerId=myId;tgt.hasCastle=false;
  state.usedAttackThisTurn=true;
  state.log.push({turn:state.turnCount,text:'🏳️ '+currentPlayer().name+' سرزمین بی‌صاحب '+cityDisplayName(tgt)+' را تصرف کرد.'});
  ui.actionMode=null;ui.selectedCity=null;checkElimination();await pushState();
}
async function submitBattleChoice(role,choice){
  const fresh=await loadRoom(code);if(fresh)state=fresh;
  const pb=state.pendingBattle;if(!pb)return;
  if(role==='attacker'){if(pb.attackerChoice)return;pb.attackerChoice=choice;}
  else{if(pb.defenderChoice)return;pb.defenderChoice=choice;}
  if(pb.attackerChoice&&pb.defenderChoice)resolveBattleStage();
  await pushState();
}
function recordRps(pid,ch){if(!state.rpsHistory)state.rpsHistory={};if(!state.rpsHistory[pid])state.rpsHistory[pid]={rock:0,paper:0,scissors:0};state.rpsHistory[pid][ch]++;}
function resolveBattleStage(){
  const pb=state.pendingBattle,tgt=cityById(pb.defenderCity),w=rpsWinner(pb.attackerChoice,pb.defenderChoice);
  const atkP=playerById(pb.attackerId),defP=playerById(pb.defenderId);
  recordRps(pb.attackerId,pb.attackerChoice);recordRps(pb.defenderId,pb.defenderChoice);
  if(w==='tie'){state.log.push({turn:state.turnCount,text:'🤝 مساوی! دوباره...'});pb.attackerChoice=null;pb.defenderChoice=null;return;}
  const aw=w==='a';
  if(tgt.hasCastle&&pb.stage===1){
    if(aw){tgt.hasCastle=false;state.log.push({turn:state.turnCount,text:'🏰💥 قلعه تخریب شد! نبرد ادامه دارد...'});pb.stage=2;pb.attackerChoice=null;pb.defenderChoice=null;return;}
    else{state.log.push({turn:state.turnCount,text:'🛡️ قلعه حمله را دفع کرد!'});state.pendingBattle=null;return;}
  }
  if(aw){
    const wasCapital=tgt.isCapital;
    tgt.ownerId=pb.attackerId;
    tgt.isCapital=false;
    SFX.capture();
    state.log.push({turn:state.turnCount,text:'🚩 '+atkP.name+' سرزمین '+tgt.mapName+' را تصرف کرد!'});
    if(wasCapital&&defP){
      defP.capitalCityId=null;
      state.pendingColonyChoice={defenderId:defP.id,attackerId:atkP.id,cityId:tgt.id,defenderDecision:null};
      state.log.push({turn:state.turnCount,text:'👑💔 پایتخت '+defP.name+' سقوط کرد! باید انتخاب کند: مستعمره یا انحلال.'});
    }
  }else{SFX.defend();state.log.push({turn:state.turnCount,text:'🛡️ '+defP.name+' با موفقیت دفاع کرد.'});}
  state.pendingBattle=null;checkElimination();
}
// وقتی بازیکن منحل می‌شود: همه سرزمین‌هایش به مهاجم منتقل می‌شود
function annexAllCities(victimId, newOwnerId){
  const newOwner=playerById(newOwnerId);
  state.cities.forEach(c=>{
    if(c.ownerId!==victimId)return;
    c.ownerId=newOwnerId;
    c.isCapital=false; // پایتخت قدیمی علامت‌گذاری پاک می‌شود
    c.hasCastle=false; // قلعه‌ها خراب می‌شوند
    c.construction=null;
  });
  state.log.push({turn:state.turnCount,text:'🗺️ تمام سرزمین‌های '+playerById(victimId)?.name+' به '+(newOwner?newOwner.name:'؟')+' ضمیمه شد.'});
}

async function submitColonyChoice(choice){
  const fresh=await loadRoom(code);if(fresh)state=fresh;
  const pc=state.pendingColonyChoice;if(!pc)return;
  const defP=playerById(pc.defenderId),atkP=playerById(pc.attackerId);
  if(choice==='dissolve'){
    defP.alive=false;
    annexAllCities(defP.id, atkP.id);
    defP.capitalCityId=null;
    SFX.defeat();
    state.log.push({turn:state.turnCount,text:'💀 '+defP.name+' منحل شد.'});
    state.pendingColonyChoice=null;checkElimination();
  }else{pc.defenderDecision='colony';state.log.push({turn:state.turnCount,text:'📨 '+defP.name+' درخواست مستعمره داد...'});}
  await pushState();
}
async function submitOverlordDecision(accept){
  const fresh=await loadRoom(code);if(fresh)state=fresh;
  const pc=state.pendingColonyChoice;if(!pc)return;
  const defP=playerById(pc.defenderId),atkP=playerById(pc.attackerId);
  if(accept){
    defP.colonyOf=atkP.id;defP.colonyTurnsLeft=5;
    state.log.push({turn:state.turnCount,text:'🤝 '+atkP.name+' پذیرفت؛ '+defP.name+' برای ۵ نوبت مستعمره شد.'});
  }else{
    defP.alive=false;
    annexAllCities(defP.id, atkP.id);
    defP.capitalCityId=null;
    SFX.defeat();
    state.log.push({turn:state.turnCount,text:'❌ درخواست رد شد؛ '+defP.name+' منحل و تمام سرزمین‌هایش ضمیمه شد.'});
    checkElimination();
  }
  state.pendingColonyChoice=null;await pushState();
}
async function startBuild(cityId){
  const c=cityById(cityId);c.construction={startRound:state.roundNumber||1};state.usedBuildThisTurn=true;
  SFX.build();
  state.log.push({turn:state.turnCount,text:'🏗️ ساخت قلعه در '+cityDisplayName(c)+' آغاز شد. (۲ دور طول می‌کشد)'});
  ui.actionMode=null;ui.selectedCity=null;await pushState();
}
// FIX: انتقال پایتخت — ۱ دور طول می‌کشد
async function startCapitalMove(toCityId){
  const me=playerById(myId);
  const fromCity=cityById(me.capitalCityId);
  const toCity=cityById(toCityId);
  if(!fromCity||!toCity||toCity.ownerId!==myId)return;
  if(me.pendingCapitalMove){state.log.push({turn:state.turnCount,text:'⚠️ یک انتقال پایتخت در جریان است.'});return;}
  me.pendingCapitalMove={fromCityId:me.capitalCityId,toCityId,startRound:state.roundNumber||1};
  state.usedCapMoveThisTurn=true;
  SFX.capitalMove();
  state.log.push({turn:state.turnCount,text:'🏛️ '+me.name+' درخواست انتقال پایتخت به '+toCity.mapName+' داد. (۱ دور طول می‌کشد)'});
  ui.actionMode=null;ui.selectedCity=null;await pushState();
}
async function doGift(cityId,targetPlayerId){
  const c=cityById(cityId),from=playerById(c.ownerId),to=playerById(targetPlayerId);
  c.ownerId=targetPlayerId;
  if(!to.alive){
    // بازیکن برمی‌گردد — شهر هدیه‌شده خودکار پایتخت جدید می‌شود
    to.alive=true;to.colonyOf=null;to.colonyTurnsLeft=0;to.pendingCapitalMove=null;
    if(to.capitalCityId){const oldCap=cityById(to.capitalCityId);if(oldCap&&oldCap.ownerId===to.id)oldCap.isCapital=false;}
    c.isCapital=true;
    to.capitalCityId=c.id;
    SFX.gift();
    state.log.push({turn:state.turnCount,text:'🕊️ '+from.name+' شهر '+c.mapName+' را به '+to.name+' هدیه داد — '+to.name+' به بازی برگشت و این شهر پایتخت جدیدش شد!'});
  }else{
    state.log.push({turn:state.turnCount,text:'🎁 '+from.name+' سرزمین '+c.mapName+' را به '+to.name+' هدیه داد.'});
  }
  ui.actionMode=null;ui.selectedCity=null;ui.giftFromCity=null;checkElimination();await pushState();
}
async function doSurrender(){
  if(!confirm('تسلیم می‌شوی؟ تمام سرزمین‌هایت بی‌دفاع می‌شوند.'))return;
  const me=playerById(myId);me.alive=false;
  state.log.push({turn:state.turnCount,text:'🏳️ '+me.name+' تسلیم شد. سرزمین‌هایش بی‌دفاع است.'});
  if(isMyTurn())nextTurn();else checkElimination();await pushState();
}
async function endTurn(){SFX.endTurn();nextTurn();await pushState();}
async function sendChat(){
  if(!ui.chatText.trim())return;
  const me=playerById(myId);
  state.chat.push({playerId:myId,name:me.name,color:me.color,text:ui.chatText.trim(),time:Date.now()});
  ui.chatText='';await pushState();
}

/* ===== TIMER ===== */
function tickTimer(){
  if(!state)return;
  if(state.phase==='capital-pick'&&state.capitalPickStartedAt){
    const rem=Math.max(0,CAPITAL_PICK_SECONDS-Math.floor((Date.now()-state.capitalPickStartedAt)/1000));
    const el2=document.getElementById('capTimerNum');if(el2)el2.textContent=rem;
    const fill=document.getElementById('capTimerFill');if(fill)fill.style.width=(rem/CAPITAL_PICK_SECONDS*100)+'%';
    if(rem<=0&&myId===state.hostId)finishCapitalPick();
    return;
  }
  if(view!=='game'||state.phase!=='playing'||!state.turnStartedAt)return;
  const rem=Math.max(0,TURN_SECONDS-Math.floor((Date.now()-state.turnStartedAt)/1000));
  const numEl=document.getElementById('turnTimerNum'),badgeEl=document.getElementById('timerBadge');
  if(numEl){numEl.textContent=rem;if(badgeEl)badgeEl.classList.toggle('warn',rem<=10);}
  if(rem<=0)handleTurnTimeout();
}
async function handleTurnTimeout(){
  if(timeoutHandled)return;timeoutHandled=true;
  try{
    const fresh=await loadRoom(code);
    if(fresh&&fresh.phase==='playing'&&fresh.turnStartedAt===state.turnStartedAt){
      state=fresh;state.log.push({turn:state.turnCount,text:'⏰ وقت '+currentPlayer().name+' تمام شد.'});
      nextTurn();await pushState();
    }else if(fresh){state=fresh;render();}
  }finally{timeoutHandled=false;}
}
setInterval(tickTimer,1000);

/* ===== BOT ===== */
let botActing=false;
function botDelay(){return new Promise(r=>setTimeout(r,300+Math.random()*400));}
function counterOf(ch){return ch==='rock'?'paper':ch==='paper'?'scissors':'rock';}
function botChoiceRPS(bot,oppId){
  const opts=['rock','paper','scissors'],rnd=()=>opts[Math.floor(Math.random()*3)];
  if(bot.botLevel==='easy')return rnd();
  const hist=state.rpsHistory&&state.rpsHistory[oppId];
  const total=hist?hist.rock+hist.paper+hist.scissors:0;
  if(bot.botLevel==='medium'){if(total>=2&&Math.random()<.5)return counterOf(Object.entries(hist).sort((a,b)=>b[1]-a[1])[0][0]);return rnd();}
  if(total>0)return counterOf(Object.entries(hist).sort((a,b)=>b[1]-a[1])[0][0]);return rnd();
}
async function runBotTurn(bot){
  const myCities=state.cities.filter(c=>c.ownerId===bot.id);
  const ap=bot.botLevel==='easy'?.4:bot.botLevel==='medium'?.65:.9;
  if(!state.usedAttackThisTurn&&Math.random()<ap){
    let pairs=[];myCities.forEach(src=>{attackTargets(src).forEach(tgt=>pairs.push([src,tgt]));});
    if(pairs.length>0){
      let chosen;
      if(bot.botLevel==='easy')chosen=pairs[Math.floor(Math.random()*pairs.length)];
      else{pairs.sort((a,b)=>{const sc=t=>(t.isCapital?-100:0)+(t.hasCastle?5:0)+cityCount(t.ownerId);return sc(a[1])-sc(b[1]);});chosen=pairs[0];}
      await declareAttack(chosen[0].id,chosen[1].id);
      if(state.pendingBattle&&state.pendingBattle.attackerId===bot.id&&!state.pendingBattle.attackerChoice)
        await submitBattleChoice('attacker',botChoiceRPS(bot,state.pendingBattle.defenderId));
    }
  }
  if(state.phase==='playing'&&!state.pendingBattle&&!state.pendingColonyChoice){
    const botAlreadyBuilding=state.cities.some(c=>c.ownerId===bot.id&&c.construction);
    const bp=bot.botLevel==='easy'?.2:bot.botLevel==='medium'?.5:.8;
    if(!state.usedBuildThisTurn&&!botAlreadyBuilding&&Math.random()<bp){
      const bl=state.cities.filter(c=>c.ownerId===bot.id&&!c.hasCastle&&!c.construction);
      if(bl.length)await startBuild(bl[Math.floor(Math.random()*bl.length)].id);
    }
  }
  if(state.phase==='playing'&&!state.pendingBattle&&!state.pendingColonyChoice)await endTurn();
}
async function maybeRunBot(){
  if(botActing)return;
  if(state&&state.phase==='capital-pick'){
    const needBot=state.players.some(p=>p.isBot&&!p.capitalCityId);
    if(needBot&&myId===state.hostId){
      botActing=true;const fresh=await loadRoom(code);if(fresh)state=fresh;
      assignBotCapitals();
      if(allCapitalsChosen())await finishCapitalPick();
      else{state.version=(state.version||0)+1;await saveRoom(state);render();}
      botActing=false;return;
    }
  }
  if(view!=='game'||!state||state.phase!=='playing')return;
  if(state.pendingColonyChoice){
    const pc=state.pendingColonyChoice,defP=playerById(pc.defenderId),atkP=playerById(pc.attackerId);
    if(defP&&defP.isBot&&!pc.defenderDecision){botActing=true;await botDelay();const f=await loadRoom(code);if(f)state=f;if(state.pendingColonyChoice&&!state.pendingColonyChoice.defenderDecision)await submitColonyChoice('colony');botActing=false;return;}
    if(pc.defenderDecision==='colony'&&atkP&&atkP.isBot){botActing=true;await botDelay();const f=await loadRoom(code);if(f)state=f;if(state.pendingColonyChoice&&state.pendingColonyChoice.defenderDecision==='colony')await submitOverlordDecision(atkP.botLevel!=='hard');botActing=false;return;}
    return;
  }
  if(state.pendingBattle){
    const pb=state.pendingBattle,atkP=playerById(pb.attackerId),defP=playerById(pb.defenderId);
    if(atkP&&atkP.isBot&&!pb.attackerChoice){botActing=true;await botDelay();const f=await loadRoom(code);if(f)state=f;if(state.pendingBattle&&!state.pendingBattle.attackerChoice)await submitBattleChoice('attacker',botChoiceRPS(atkP,pb.defenderId));botActing=false;return;}
    if(defP&&defP.isBot&&!pb.defenderChoice){botActing=true;await botDelay();const f=await loadRoom(code);if(f)state=f;if(state.pendingBattle&&!state.pendingBattle.defenderChoice)await submitBattleChoice('defender',botChoiceRPS(defP,pb.attackerId));botActing=false;return;}
    return;
  }
  const cp=currentPlayer();
  if(cp&&cp.isBot){botActing=true;await botDelay();const f=await loadRoom(code);if(f)state=f;const cp2=currentPlayer();if(cp2&&cp2.isBot&&cp2.id===cp.id&&state.phase==='playing'&&!state.pendingBattle&&!state.pendingColonyChoice)await runBotTurn(cp2);botActing=false;}
}
setInterval(maybeRunBot,800);

/* ===== POLLING ===== */
function startPolling(){
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(async()=>{
    if(!code)return;
    const fresh=await loadRoom(code);
    if(fresh&&(!state||fresh.version!==state.version)){
      state=fresh;
      if(state.phase==='playing'||state.phase==='ended'||state.phase==='capital-pick')view='game';
      render();
    }
  },800);
}

/* ===== GAME RENDER ===== */
function renderGame(){
  if(state.phase==='ended')return renderWinner();
  const wrap=document.createElement('div');
  const cur=currentPlayer();
  const rem=Math.max(0,TURN_SECONDS-Math.floor((Date.now()-(state.turnStartedAt||Date.now()))/1000));
  const top=el(`<div class="top-bar">
    <div class="turn-banner"><div class="dot" style="background:${cur.color}"></div>
      <div><b>${isMyTurn()?'نوبت توست!':'نوبت: '+cur.name}</b>
        <div class="small">${state.phase==='capital-pick'?'⏳ انتخاب پایتخت':'نوبت '+state.turnCount+' — دور '+(state.roundNumber||1)+' — کد: '+code}</div>
      </div>
      ${state.phase==='playing'?`<div class="timer-badge ${rem<=10?'warn':''}" id="timerBadge">⏱️ <span id="turnTimerNum">${rem}</span>ث</div>`:''}
    </div>
    <div class="players-strip" id="pstrip"></div>
    <button class="btn" id="leaveBtn" style="font-size:12px;padding:8px 12px;">🔁 خروج</button>
  </div>`);
  top.querySelector('#leaveBtn').onclick=()=>{if(confirm('خارج بشی؟'))leaveSession();};
  const strip=top.querySelector('#pstrip');
  state.players.forEach((p,i)=>{
    strip.appendChild(el(`<div class="player-chip ${!p.alive?'dead':''} ${i===state.currentPlayerIndex&&state.phase==='playing'?'current':''}">
      <div class="dot" style="background:${p.color}"></div>${p.name}(${cityCount(p.id)})${p.colonyOf?' ⛓️'+p.colonyTurnsLeft:''}${p.pendingCapitalMove?' 🏛️↗️':''}</div>`));
  });
  wrap.appendChild(top);
  const layout=el(`<div class="layout"></div>`);
  layout.appendChild(renderMap());
  layout.appendChild(renderSidePanel());
  wrap.appendChild(layout);
  wrap.appendChild(el(`<div class="footnote">🪶 قوانین: هر بازیکن ۵ سرزمین دارد. پایتخت را خودت انتخاب می‌کنی. حمله فقط به همسایه‌های مجاور. بازیکن منحل‌شده نمی‌تواند دفاع کند — شهرهایش آزاد و قابل تصرف هستند. ساخت قلعه: ۲ دور؛ در هر نوبت فقط یک ساخت‌وساز فعال. انتقال پایتخت: ۱ دور. هر نوبت ${TURN_SECONDS} ثانیه.</div>`));
  renderModals(wrap);return wrap;
}

/* ===== MAP RENDER ===== */
function lightenColor(h,a){const n=parseInt(h.slice(1),16),r=Math.min(255,(n>>16)+a),g=Math.min(255,((n>>8)&255)+a),b=Math.min(255,(n&255)+a);return'#'+((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);}
function darkenColor(h,a){const n=parseInt(h.slice(1),16),r=Math.max(0,(n>>16)-a),g=Math.max(0,((n>>8)&255)-a),b=Math.max(0,(n&255)-a);return'#'+((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);}

function isSelectableCity(c){
  if(state.phase==='capital-pick')return c.ownerId===myId&&!c.isCapital;
  if(!isMyTurn()||state.pendingBattle)return false;
  if(ui.actionMode==='attack-src')return c.ownerId===myId&&attackTargets(c).length>0&&!state.usedAttackThisTurn;
  if(ui.actionMode==='attack-tgt')return ui.selectedCity&&attackTargets(cityById(ui.selectedCity)).some(t=>t.id===c.id);
  if(ui.actionMode==='build-src'){
    const alreadyBuilding=state.cities.some(x=>x.ownerId===myId&&x.construction);
    return c.ownerId===myId&&!c.construction&&!c.hasCastle&&!state.usedBuildThisTurn&&!alreadyBuilding;
  }
  if(ui.actionMode==='gift-src')return c.ownerId===myId;
  if(ui.actionMode==='capMove-src'){
    const me=playerById(myId);return c.ownerId===myId&&!c.isCapital&&!me.pendingCapitalMove&&!state.usedCapMoveThisTurn;
  }
  return false;
}

function renderMap(){
  const SVG_W=800,SVG_H=545;
  let defsSVG=`<defs>
    <linearGradient id="bgLand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8cca8"/><stop offset="100%" stop-color="#c8ba90"/>
    </linearGradient>
    <filter id="ts" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="rgba(30,18,5,0.5)"/>
    </filter>
  </defs>
  <rect width="${SVG_W}" height="${SVG_H}" fill="url(#bgLand)" rx="14"/>`;

  let pathsSVG='',labelsSVG='';

  state.cities.forEach(city=>{
    const owner=playerById(city.ownerId);
    const base=owner?owner.color:'#9c9080';
    const gid='g_'+city.id.replace(/\W/g,'_');
    defsSVG+=`<linearGradient id="${gid}" x1="0%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="${lightenColor(base,38)}"/>
      <stop offset="100%" stop-color="${darkenColor(base,18)}"/>
    </linearGradient>`;
    const sel=isSelectableCity(city),selected=ui.selectedCity===city.id;
    const myP=playerById(myId);
    const isMyCapSelected=myP&&myP.capitalCityId===city.id;
    const isPendingMove=myP&&myP.pendingCapitalMove&&myP.pendingCapitalMove.toCityId===city.id;

    pathsSVG+=`<path class="territory-path${sel?' selectable':''}${selected?' selected':''}"
      data-city="${city.id}" d="${city.mapPath}" fill="url(#${gid})" filter="url(#ts)"
      ${isMyCapSelected?'stroke="#ffe87a" stroke-width="5"':''}
      ${isPendingMove?'stroke="#aaffaa" stroke-width="4" stroke-dasharray="8,4"':''}/>`;

    const cx=city.mapCx,cy=city.mapCy;
    const roundsLeft=city.construction?Math.max(0,2-((state.roundNumber||1)-city.construction.startRound)):0;
    const icon=city.hasCastle?'🏰':city.construction?`⏳${roundsLeft}`:'';
    // FIX: owner منحل‌شده با نشانه ☠
    const ownerName=owner?(owner.alive?owner.name:'☠ '+owner.name):'—';
    labelsSVG+=`
      <text class="t-name${city.isCapital?' is-capital':''}" x="${cx}" y="${cy-12}">${city.isCapital?'★ ':''}${city.mapName}</text>
      <text class="t-owner" x="${cx}" y="${cy+5}">${ownerName}</text>
      ${icon?`<text class="t-icon" x="${cx}" y="${cy+20}">${icon}</text>`:''}
    `;
  });

  const compass=`<g transform="translate(770,28)">
    <circle r="16" fill="rgba(80,60,30,.25)" stroke="rgba(80,60,30,.4)" stroke-width="1"/>
    <text text-anchor="middle" y="-5" font-size="8" fill="rgba(60,40,10,.8)" font-family="sans-serif">N</text>
    <polygon points="0,-12 2.5,-2 0,2 -2.5,-2" fill="rgba(180,40,30,.8)"/>
    <polygon points="0,12 2.5,2 0,-2 -2.5,2" fill="rgba(80,60,30,.6)"/>
  </g>`;
  const title=`<text x="12" y="20" font-family="Vazirmatn,sans-serif" font-size="12" font-weight="800" fill="rgba(70,50,20,.65)">🗺️ خاورمیانه و آسیای مرکزی</text>`;

  const svgHtml=`<svg class="map-svg" viewBox="0 0 ${SVG_W} ${SVG_H}" xmlns="http://www.w3.org/2000/svg" style="border-radius:14px;overflow:visible;">
    ${defsSVG}${pathsSVG}
    <g class="labels-layer">${labelsSVG}</g>
    ${compass}${title}
  </svg>`;

  const mapDiv=document.createElement('div');mapDiv.className='map-card';

  // نوار بالایی انتخاب پایتخت (خارج از SVG — کلیک را بلاک نمی‌کند)
  if(state.phase==='capital-pick'){
    const me=playerById(myId);
    const remCap=Math.max(0,CAPITAL_PICK_SECONDS-Math.floor((Date.now()-(state.capitalPickStartedAt||Date.now()))/1000));
    const alreadyPicked=me&&me.capitalCityId;
    const bar=document.createElement('div');bar.className='cap-pick-bar';
    bar.innerHTML=`${alreadyPicked
      ?`<span style="color:var(--ok)">✅ پایتخت: <b>${cityById(me.capitalCityId)?.mapName}</b> — منتظر بقیه...</span>`
      :`<span style="color:var(--accent)">🏰 روی یکی از سرزمین‌هایت کلیک کن تا پایتخت شود</span>`}
    &nbsp; ⏳ <span id="capTimerNum">${remCap}</span>ث
    <div class="cap-timer-bar"><div class="cap-timer-fill" id="capTimerFill" style="width:${remCap/CAPITAL_PICK_SECONDS*100}%"></div></div>
    <div class="small" style="margin-top:4px">${state.players.filter(p=>!p.isBot).map(p=>`${p.capitalCityId?'✅':'⏳'} ${p.name}`).join(' | ')}</div>`;
    mapDiv.appendChild(bar);
  }

  mapDiv.innerHTML+=svgHtml;

  mapDiv.querySelectorAll('[data-city]').forEach(el2=>{
    el2.style.cursor='pointer';
    el2.addEventListener('click',()=>{const cid=el2.getAttribute('data-city');if(cid)handleCityClick(cid);});
  });

  const leg=document.createElement('div');leg.className='map-legend';
  state.players.forEach(p=>{
    const it=document.createElement('div');it.className='legend-item';
    it.innerHTML=`<div class="legend-dot" style="background:${p.color};${!p.alive?'opacity:.4':''}"></div>${p.alive?p.name:'<s>'+p.name+'</s>'} (${cityCount(p.id)})${p.capitalCityId?' ★':''}${p.pendingCapitalMove?' 🏛️':''}}`;
    leg.appendChild(it);
  });
  mapDiv.appendChild(leg);
  const outer=el(`<div class="map-wrap"></div>`);outer.appendChild(mapDiv);return outer;
}

function handleCityClick(cid){
  const c=cityById(cid);if(!c)return;
  // فاز انتخاب پایتخت
  if(state.phase==='capital-pick'){
    if(c.ownerId!==myId)return;
    const me=playerById(myId);if(me.capitalCityId)return;
    me.capitalCityId=cid;c.isCapital=true;
    state.log.push({turn:0,text:'🏰 '+me.name+' شهر '+c.mapName+' را پایتخت کرد.'});
    if(allCapitalsChosen())finishCapitalPick();else pushState();
    return;
  }
  if(ui.actionMode==='attack-src'&&c.ownerId===myId){ui.selectedCity=cid;ui.actionMode='attack-tgt';render();return;}
  if(ui.actionMode==='attack-tgt'){
    const src=cityById(ui.selectedCity);
    if(!attackTargets(src).some(t=>t.id===cid))return;
    if(!c.ownerId)doNeutralAttack(ui.selectedCity,cid);
    else declareAttack(ui.selectedCity,cid);
    return;
  }
  if(ui.actionMode==='build-src'&&c.ownerId===myId){startBuild(cid);return;}
  if(ui.actionMode==='gift-src'&&c.ownerId===myId){ui.giftFromCity=cid;ui.actionMode='gift-choose';render();return;}
  if(ui.actionMode==='capMove-src'&&c.ownerId===myId){startCapitalMove(cid);return;}
}

function renderSidePanel(){
  const panel=el(`<div class="side-panel"></div>`);
  if(state.phase==='capital-pick'){
    const me=playerById(myId);
    panel.appendChild(el(`<div class="card"><h3 class="display" style="font-size:15px;color:var(--accent);margin:0 0 8px">🏰 انتخاب پایتخت</h3>
      <div class="small">روی نقشه یکی از سرزمین‌هایت را کلیک کن. اگر همه زودتر انتخاب کنند، بازی شروع می‌شود.</div>
      <div style="margin-top:10px">
        ${state.players.filter(p=>!p.isBot).map(p=>`<div style="display:flex;align-items:center;gap:6px;margin:4px 0">
          <div class="dot" style="background:${p.color}"></div>${p.name}:
          ${p.capitalCityId?`<b style="color:var(--ok)">✅ ${cityById(p.capitalCityId)?.mapName}</b>`:'<span style="color:var(--ink-soft)">⏳ در انتظار...</span>'}
        </div>`).join('')}
      </div>
    </div>`));
  }
  if(state.phase==='playing'){
    if(state.pendingBattle)panel.appendChild(el(`<div class="banner-wait">⚔️ نبرد در جریان — منتظر پاسخ دفاعی...</div>`));
    if(state.pendingColonyChoice)panel.appendChild(el(`<div class="banner-wait">👑 سرنوشت پایتخت در حال تعیین...</div>`));
    if(isMyTurn()&&!state.pendingBattle){
      const me=playerById(myId);
      const alreadyBuilding=state.cities.some(x=>x.ownerId===myId&&x.construction);
      const actions=el(`<div class="card"><h3 class="display" style="font-size:15px;margin:0 0 10px;color:var(--accent)">اقدامات نوبت</h3><div class="action-btns"></div></div>`);
      const grid=actions.querySelector('.action-btns');
      // حمله
      const atkBtn=el(`<button class="btn">⚔️ حمله</button>`);
      atkBtn.disabled=state.usedAttackThisTurn;
      atkBtn.onclick=()=>{ui.actionMode=ui.actionMode==='attack-src'?null:'attack-src';render();};
      // ساخت قلعه
      const bldBtn=el(`<button class="btn" title="${alreadyBuilding?'ساخت‌وساز فعال دارید':''}">🏰 قلعه${alreadyBuilding?' ⏳':''}</button>`);
      bldBtn.disabled=state.usedBuildThisTurn||alreadyBuilding;
      bldBtn.onclick=()=>{ui.actionMode=ui.actionMode==='build-src'?null:'build-src';render();};
      // هدیه
      const gftBtn=el(`<button class="btn">🎁 هدیه</button>`);
      gftBtn.onclick=()=>{ui.actionMode=ui.actionMode==='gift-src'?null:'gift-src';render();};
      // انتقال پایتخت
      const capBtn=el(`<button class="btn" title="انتقال پایتخت به شهر دیگر (۱ دور طول می‌کشد)">🏛️ انتقال پایتخت${me&&me.pendingCapitalMove?' ⏳':''}</button>`);
      capBtn.disabled=state.usedCapMoveThisTurn||(me&&!!me.pendingCapitalMove)||!me?.capitalCityId;
      capBtn.onclick=()=>{ui.actionMode=ui.actionMode==='capMove-src'?null:'capMove-src';render();};
      // تسلیم
      const surBtn=el(`<button class="btn btn-danger">🏳️ تسلیم</button>`);
      surBtn.onclick=doSurrender;
      grid.appendChild(atkBtn);grid.appendChild(bldBtn);grid.appendChild(gftBtn);grid.appendChild(capBtn);grid.appendChild(surBtn);
      const endBtn=el(`<button class="btn btn-gold" style="width:100%;margin-top:10px;">پایان نوبت ⏭️</button>`);
      endBtn.onclick=endTurn;actions.appendChild(endBtn);
      if(ui.actionMode)actions.appendChild(el(`<div class="hint">${modeHint()}</div>`));
      panel.appendChild(actions);
    }else if(!state.pendingBattle&&state.phase==='playing'){
      panel.appendChild(el(`<div class="card"><div class="small">منتظر نوبتت هستی. اگر کسی حمله کند، باید فوری دفاع کنی.</div></div>`));
    }
  }
  // لاگ و چت
  const logCard=el(`<div class="card"></div>`);
  const tabs=el(`<div class="tabs"><div class="tab ${ui.activeTab==='log'?'active':''}" id="tl">رویدادها</div><div class="tab ${ui.activeTab==='chat'?'active':''}" id="tc">گفتگو</div></div>`);
  tabs.querySelector('#tl').onclick=()=>{ui.activeTab='log';render();};tabs.querySelector('#tc').onclick=()=>{ui.activeTab='chat';render();};
  logCard.appendChild(tabs);
  if(ui.activeTab==='log'){
    const box=el(`<div class="log-box"></div>`);
    [...state.log].slice(-60).reverse().forEach(l=>box.appendChild(el(`<div class="log-line">${l.text}</div>`)));
    logCard.appendChild(box);
  }else{
    const box=el(`<div class="log-box"></div>`);
    [...state.chat].slice(-60).reverse().forEach(m=>box.appendChild(el(`<div class="log-line"><b style="color:${m.color}">${m.name}:</b> ${escHtml(m.text)}</div>`)));
    logCard.appendChild(box);
    const row=el(`<div class="chat-input-row"><input type="text" id="chatIn" placeholder="پیام..."><button class="btn">ارسال</button></div>`);
    row.querySelector('#chatIn').value=ui.chatText;row.querySelector('#chatIn').oninput=e=>ui.chatText=e.target.value;
    row.querySelector('#chatIn').addEventListener('keydown',e=>{if(e.key==='Enter')sendChat();});row.querySelector('button').onclick=sendChat;
    logCard.appendChild(row);
    const em=el(`<div class="emoji-row"></div>`);
    ['😂','😡','🔥','GG'].forEach(t=>{const b=document.createElement('button');b.textContent=t;b.onclick=()=>{ui.chatText=t;sendChat();};em.appendChild(b);});
    logCard.appendChild(em);
  }
  panel.appendChild(logCard);return panel;
}
function escHtml(s){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function modeHint(){
  if(ui.actionMode==='attack-src')return'روی یکی از سرزمین‌هایت (هایلایت طلایی) کلیک کن.';
  if(ui.actionMode==='attack-tgt')return'روی سرزمین دشمن مجاور کلیک کن.';
  if(ui.actionMode==='build-src')return'سرزمینی بدون قلعه و بدون ساخت‌وساز فعال انتخاب کن.';
  if(ui.actionMode==='gift-src')return'سرزمینی که می‌خواهی هدیه دهی را انتخاب کن.';
  if(ui.actionMode==='gift-choose')return'گیرنده را انتخاب کن.';
  if(ui.actionMode==='capMove-src')return'شهری که می‌خواهی پایتخت جدید باشد را انتخاب کن. (۱ دور تأخیر دارد)';
  return'';
}

function renderModals(wrap){
  if(state.pendingBattle){
    const pb=state.pendingBattle;
    if(pb.attackerId===myId&&!pb.attackerChoice){
      const tgt=cityById(pb.defenderCity);
      const m=el(`<div class="modal-bg"><div class="modal"><h3 class="display" style="color:var(--accent)">حمله به ${cityDisplayName(tgt)}</h3>
        <div class="small">${pb.stage===2?'قلعه تخریب شد. ':''}انتخاب تو:</div><div class="rps-row" id="rr"></div></div></div>`);
      RPS.forEach(o=>{const b=el(`<button class="rps-btn" title="${o.label}">${o.icon}</button>`);b.onclick=()=>submitBattleChoice('attacker',o.k);m.querySelector('#rr').appendChild(b);});
      wrap.appendChild(m);
    }else if(pb.defenderId===myId&&!pb.defenderChoice){
      // FIX: اگر بازیکن منحل شده باشد، modal دفاع نمایش داده نمی‌شود
      const defP=playerById(pb.defenderId);
      if(!defP||!defP.alive)return;
      const tgt=cityById(pb.defenderCity),atkP=playerById(pb.attackerId);
      const m=el(`<div class="modal-bg"><div class="modal"><h3 class="display" style="color:var(--accent)">${atkP.name} حمله کرد!</h3>
        <div class="small">${pb.stage===2?'قلعه تخریب شد. ':''}فوری دفاع کن:</div><div class="rps-row" id="rr"></div></div></div>`);
      RPS.forEach(o=>{const b=el(`<button class="rps-btn" title="${o.label}">${o.icon}</button>`);b.onclick=()=>submitBattleChoice('defender',o.k);m.querySelector('#rr').appendChild(b);});
      wrap.appendChild(m);
    }
  }
  if(state.pendingColonyChoice){
    const pc=state.pendingColonyChoice,defP=playerById(pc.defenderId),atkP=playerById(pc.attackerId);
    if(pc.defenderId===myId&&!pc.defenderDecision){
      const m=el(`<div class="modal-bg"><div class="modal"><h3 class="display" style="color:var(--danger)">پایتختت سقوط کرد!</h3>
        <div class="small">مستعمره‌ی ${atkP.name} بشی (۵ نوبت حمله نکنی) یا منحل بشی؟</div>
        <div class="btn-row" style="justify-content:center;margin-top:14px">
          <button class="btn btn-gold" id="bc">⛓️ مستعمره</button><button class="btn btn-danger" id="bd">💀 منحل</button>
        </div></div></div>`);
      m.querySelector('#bc').onclick=()=>submitColonyChoice('colony');m.querySelector('#bd').onclick=()=>submitColonyChoice('dissolve');wrap.appendChild(m);
    }else if(pc.defenderDecision==='colony'&&pc.attackerId===myId){
      const m=el(`<div class="modal-bg"><div class="modal"><h3 class="display" style="color:var(--accent)">${defP.name} می‌خواد مستعمره شه</h3>
        <div class="small">قبول = ۵ نوبت بدون حمله. رد = منحل و سرزمین‌هایش بی‌دفاع.</div>
        <div class="btn-row" style="justify-content:center;margin-top:14px">
          <button class="btn btn-gold" id="ba">✅ قبول</button><button class="btn btn-danger" id="br">❌ رد</button>
        </div></div></div>`);
      m.querySelector('#ba').onclick=()=>submitOverlordDecision(true);m.querySelector('#br').onclick=()=>submitOverlordDecision(false);wrap.appendChild(m);
    }
  }
  if(ui.actionMode==='gift-choose'){
    const c=cityById(ui.giftFromCity),others=state.players.filter(p=>p.id!==myId);
    const m=el(`<div class="modal-bg"><div class="modal"><h3 class="display" style="color:var(--accent)">هدیه ${cityDisplayName(c)}</h3>
      <div class="btn-row" style="justify-content:center;flex-direction:column;align-items:stretch" id="gl"></div>
      <button class="btn btn-danger" id="gx" style="margin-top:10px">انصراف</button></div></div>`);
    others.forEach(p=>{const b=el(`<button class="btn">${p.alive?p.name:'☠️ '+p.name+' (بازگرداندن)'}</button>`);b.onclick=()=>doGift(c.id,p.id);m.querySelector('#gl').appendChild(b);});
    m.querySelector('#gx').onclick=()=>{ui.actionMode=null;ui.giftFromCity=null;render();};wrap.appendChild(m);
  }
}

function startNewGameFlow(){
  try{if(code)localStorage.removeItem('myid-'+code);localStorage.removeItem('lastCode');}catch{}
  if(pollTimer)clearInterval(pollTimer);
  code=null;myId=null;state=null;ui.setupName='';ui.setupColor=null;ui.joinCode='';view='landing';render();
}
function renderWinner(){
  if(state.winnerId===myId) SFX.victory();
  else if(state.winnerId) SFX.defeat();
  const w=state.winnerId?playerById(state.winnerId):null;
  const node=el(`<div class="card winner-screen"><div class="crown">👑</div>
    <h1 class="main-title">${w?w.name+' برنده شد!':'بازی بدون برنده پایان یافت'}</h1>
    ${w?`<div class="small">پایتخت: ${cityById(w.capitalCityId)?.mapName||'—'}</div>`:''}
    <div class="btn-row" style="justify-content:center;margin-top:10px"><button class="btn btn-gold" id="ngb">🎮 بازی جدید</button></div>
    <div class="log-box" style="margin:20px auto;max-width:420px;text-align:right">
      ${[...state.log].slice(-30).reverse().map(l=>`<div class="log-line">${l.text}</div>`).join('')}
    </div></div>`);
  node.querySelector('#ngb').onclick=startNewGameFlow;return node;
}

async function tryAutoResume(){
  let lc;try{lc=localStorage.getItem('lastCode');}catch{return false;}
  if(!lc)return false;const sid=await loadMyId(lc);if(!sid)return false;
  const s=await loadRoom(lc);if(!s)return false;
  if(!s.players.some(p=>p.id===sid))return false;
  code=lc;myId=sid;state=s;view=s.phase==='lobby'?'lobby':'game';startPolling();return true;
}
function leaveSession(){
  try{if(code)localStorage.removeItem('myid-'+code);localStorage.removeItem('lastCode');}catch{}
  if(pollTimer)clearInterval(pollTimer);code=null;myId=null;state=null;view='landing';render();
}

(async function init(){
  const params=new URLSearchParams(window.location.search);
  const urlCode=params.get('code');
  const resumed=await tryAutoResume();
  if(!resumed&&urlCode&&/^\d{6}$/.test(urlCode)){ui.joinCode=urlCode;view='join';}
  render();
})();
